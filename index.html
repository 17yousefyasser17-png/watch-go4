<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Modern Streaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #050505; 
            --card-bg: #111;
            --text: #ffffff;
            --transition: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* تأثير التوهج الخلفي */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(155, 81, 224, 0.08) 0%, transparent 80%);
            filter: blur(100px); z-index: -1;
        }

        /* --- الهيدر والقوائم --- */
        .header { 
            background: rgba(10, 10, 10, 0.95); padding: 10px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
        }
        .logo-ctn { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .logo-ctn img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }

        .main-nav { display: flex; list-style: none; }
        .nav-item { position: relative; }
        .nav-link { color: #ddd; text-decoration: none; font-size: 14px; font-weight: 600; padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .dropdown {
            position: absolute; top: 100%; right: 0; background: #111; min-width: 200px; 
            border-radius: 0 0 8px 8px; border: 1px solid #333; border-top: 2px solid var(--primary);
            display: none; z-index: 1100;
        }
        .nav-item:hover .dropdown { display: block; }
        .dropdown a { color: #eee; padding: 12px 20px; text-decoration: none; display: block; font-size: 13px; text-align: right; border-bottom: 1px solid #222; }

        /* --- السلايدر العلوي الرئيسي --- */
        #heroSection { width: 100%; height: 320px; position: relative; overflow: hidden; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s ease; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center top; position: relative; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-dark) 10%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px 60px; }

        /* --- تنسيق الأقسام المتحركة (Carousel) --- */
        .main-col { padding: 20px 40px; display: flex; flex-direction: column; gap: 40px; }
        .section-header { margin-bottom: 15px; border-right: 4px solid var(--primary); padding-right: 15px; }
        .section-header h3 { font-size: 18px; color: var(--primary); }

        /* حاوية الحركة العرضية */
        .scroll-container { 
            display: flex; overflow-x: auto; gap: 20px; padding-bottom: 15px; 
            scroll-behavior: smooth; scrollbar-width: none; /* إخفاء شريط التمرير */
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .item-card { 
            min-width: 170px; max-width: 170px; background: var(--card-bg); 
            border-radius: 12px; overflow: hidden; transition: var(--transition); 
            cursor: pointer; position: relative; border: 1px solid #222;
        }
        .item-card:hover { transform: scale(1.05); border-color: var(--primary); z-index: 10; }
        .item-card img { width: 100%; height: 240px; object-fit: cover; }
        
        .item-info { padding: 10px; text-align: center; }
        .item-name { font-size: 12px; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
        
        /* زر شاهد الآن */
        .watch-now-btn {
            background: var(--primary); color: white; font-size: 10px; font-weight: bold;
            padding: 6px 0; border-radius: 4px; text-transform: uppercase;
            display: block; transition: 0.3s; opacity: 0.9;
        }
        .item-card:hover .watch-now-btn { background: #fff; color: var(--primary); }

        /* وضع العرض الكامل (عند اختيار قسم) */
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .hidden { display: none; }

        #searchBox { display: none; padding: 20px; background: #0a0a0a; text-align: center; }
        #searchBox input { width: 70%; padding: 12px 25px; border-radius: 30px; border: 1px solid var(--primary); background: #111; color: #fff; outline: none; }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-ctn">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
            <span style="font-weight: bold;">WATCHGO</span>
        </a>

        <ul class="main-nav">
            <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
            <li class="nav-item">
                <span class="nav-link">الأفلام <i class="fa-solid fa-chevron-down"></i></span>
                <div class="dropdown">
                    <a href="#" onclick="showCategory('discover/movie', 'أفلام أجنبي', '')">أفلام أجنبي</a>
                    <a href="#" onclick="showCategory('discover/movie', 'أفلام أنمي', '16')">أفلام أنمي</a>
                    <a href="#" onclick="showCategory('discover/movie', 'أفلام نتفليكس', '213')">أفلام نتفليكس</a>
                </div>
            </li>
            <li class="nav-item"><a class="nav-link" onclick="showCategory('discover/tv', 'المسلسلات الكاملة', '')">المسلسلات</a></li>
        </ul>

        <div class="header-icons"><i class="fa-solid fa-magnifying-glass" onclick="toggleSearch()" style="cursor:pointer"></i></div>
    </header>

    <div id="searchBox"><input type="text" placeholder="ابحث عن فيلم أو مسلسل..." onkeyup="searchApi(this.value)"></div>

    <div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div>

    <main class="main-col">
        <div id="homeSections">
            <section>
                <div class="section-header"><h3><i class="fa-solid fa-star"></i> أفلام أجنبي حديثة</h3></div>
                <div class="scroll-container" id="foreignScroll"></div>
            </section>

            <section>
                <div class="section-header"><h3><i class="fa-solid fa-n"></i> أفلام نتفليكس</h3></div>
                <div class="scroll-container" id="netflixScroll"></div>
            </section>

            <section>
                <div class="section-header"><h3><i class="fa-solid fa-ghost"></i> أفلام أنمي</h3></div>
                <div class="scroll-container" id="animeScroll"></div>
            </section>
        </div>

        <div id="categoryFullView" class="hidden">
            <div class="section-header"><h3 id="categoryTitle"></h3></div>
            <div class="grid-view" id="categoryGrid"></div>
        </div>
    </main>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';

        function toggleSearch() {
            const s = document.getElementById('searchBox');
            s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        }

        // وظيفة بناء كارت الفيلم مع زر "شاهد الآن"
        function createMovieCard(m, type) {
            return `
                <div class="item-card" onclick="location.href='movie.html?id=${m.id}&type=${type}'">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" alt="${m.title || m.name}">
                    <div class="item-info">
                        <div class="item-name">${m.title || m.name}</div>
                        <div class="watch-now-btn">شاهد الآن</div>
                    </div>
                </div>
            `;
        }

        async function fetchScrollData(endpoint, containerId, genreId = '', isTV = false) {
            let url = `${BASE_URL}/${endpoint}?api_key=${API_KEY}&language=en-US`;
            if(genreId) url += `&with_genres=${genreId}`;
            if(containerId.includes('netflix')) url += `&with_networks=213`;

            const res = await fetch(url);
            const data = await res.json();
            const container = document.getElementById(containerId);
            container.innerHTML = data.results.map(m => createMovieCard(m, isTV ? 'tv' : 'movie')).join('');
            return data.results;
        }

        async function showCategory(endpoint, title, genreId) {
            document.getElementById('homeSections').classList.add('hidden');
            document.getElementById('categoryFullView').classList.remove('hidden');
            document.getElementById('categoryTitle').innerText = title;

            let url = `${BASE_URL}/${endpoint}?api_key=${API_KEY}&language=en-US`;
            if(genreId) url += `&with_genres=${genreId}`;
            
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('categoryGrid').innerHTML = data.results.map(m => createMovieCard(m, endpoint.includes('tv') ? 'tv' : 'movie')).join('');
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        async function init() {
            // السلايدر العلوي
            const pop = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}`);
            const popData = await pop.json();
            renderSlider(popData.results.slice(0, 5));

            // الأقسام العرضية (التحريك يمين وشمال)
            fetchScrollData('movie/popular', 'foreignScroll');
            fetchScrollData('discover/movie', 'netflixScroll', '213');
            fetchScrollData('discover/movie', 'animeScroll', '16');
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay"><h2 style="font-size:28px;">${m.title}</h2></div>
                </div>
            `).join('');
            let i = 0; setInterval(() => { i = (i + 1) % 5; wrapper.style.transform = `translateX(${i * 100}%)`; }, 5000);
        }

        init();
    </script>
</body>
</html>
