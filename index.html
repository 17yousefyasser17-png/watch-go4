<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Pro Cinema Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- كودك الأصلي بدون أي تعديل --- */
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #050505; 
            --card-bg: rgba(20, 20, 20, 0.95);
            --transition: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(155, 81, 224, 0.08) 0%, transparent 85%);
            filter: blur(100px); z-index: -1;
        }

        .header { 
            background: #0a0a0a; padding: 0 40px; height: 75px;
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 2000;
        }
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }

        .main-nav { display: flex; list-style: none; height: 100%; align-items: center; }
        .nav-item { position: relative; height: 100%; display: flex; align-items: center; }
        .nav-link { 
            color: #fff; text-decoration: none; font-size: 14px; font-weight: bold; 
            padding: 0 15px; cursor: pointer; display: flex; align-items: center; gap: 6px;
            height: 100%; transition: 0.3s;
        }
        .nav-link:hover { background: rgba(155, 81, 224, 0.1); color: var(--primary); }
        .nav-link i { font-size: 10px; color: var(--primary); transition: 0.3s; }

        .dropdown {
            position: absolute; top: 75px; right: 0; background: #111; min-width: 200px; 
            border-top: 3px solid var(--primary); display: none; flex-direction: column;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
        }
        .nav-item:hover .dropdown { display: flex; }
        .nav-item:hover .nav-link i { transform: rotate(180deg); }
        .dropdown a { color: #eee; padding: 12px 20px; text-decoration: none; font-size: 13px; border-bottom: 1px solid #222; text-align: right; }
        .dropdown a:hover { background: #1a1a1a; color: var(--primary); }

        #heroSection { width: 100%; height: 450px; position: relative; overflow: hidden; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center 15%; position: relative; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-dark) 5%, transparent 100%); display: flex; flex-direction: column; justify-content: center; padding: 0 80px; }
        .slide-title { font-size: 40px; font-weight: 900; margin-bottom: 20px; }
        .hero-btn { background: var(--primary); color: white; text-decoration: none; padding: 12px 35px; border-radius: 50px; font-weight: bold; display: flex; align-items: center; gap: 10px; width: fit-content; transition: 0.3s; }
        .hero-btn:hover { transform: scale(1.05); background: #fff; color: var(--primary); }

        .container { padding: 30px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; }
        .section-box { margin-bottom: 40px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; border: 1px solid rgba(155, 81, 224, 0.1); }
        .section-title { color: var(--primary); font-size: 18px; font-weight: bold; margin-bottom: 20px; border-right: 4px solid var(--primary); padding-right: 12px; }
        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }

        .item-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .item-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .item-card img { width: 100%; height: 230px; object-fit: cover; }
        .item-info { padding: 10px; text-align: center; }
        .item-name { font-size: 12px; font-weight: bold; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .watch-btn { background: var(--primary); color: #fff; font-size: 10px; padding: 6px; border-radius: 4px; font-weight: bold; }

        .sidebar { background: rgba(10, 10, 10, 0.7); padding: 15px; border-radius: 12px; border: 1px solid rgba(155, 81, 224, 0.1); height: fit-content; position: sticky; top: 90px; }
        .side-title { color: var(--primary); font-size: 14px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 8px; text-align: center; }
        .side-item { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; cursor: pointer; font-size: 11px; }
        .side-item img { width: 45px; height: 65px; border-radius: 5px; object-fit: cover; }

        /* --- إضافات الموبايل فقط (بدون التأثير على الديسكتوب) --- */
        @media (max-width: 768px) {
            .mobile-ui { display: flex !important; flex-wrap: wrap; gap: 10px; margin-top: 15px; justify-content: center; }
            .m-red { background: #ff4b5c; flex: 1; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; text-decoration: none; color: white; }
            .m-yellow { background: #ffcc00; flex: 1; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; text-decoration: none; color: black; }
            .news-m { background: #ff4b5c; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-bottom: 100px; display: block !important; width: fit-content; }
            .container { grid-template-columns: 1fr; padding: 15px; }
            .sidebar { display: none; }
            .hero-btn { display: none; } /* إخفاء زرار الديسكتوب في الموبايل */
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-ctn">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
            <span style="font-weight: bold; font-size: 22px;">WATCHGO</span>
        </a>
        
        <ul class="main-nav">
            <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
            <li class="nav-item">
                <span class="nav-link">الأفلام <i class="fa-solid fa-chevron-down"></i></span>
                <div class="dropdown">
                    <a href="#">أفلام أجنبية</a>
                    <a href="#">أفلام نتفليكس</a>
                </div>
            </li>
            <li class="nav-item">
                <span class="nav-link">المسلسلات <i class="fa-solid fa-chevron-down"></i></span>
                <div class="dropdown">
                    <a href="#">مسلسلات حديثة</a>
                    <a href="#">الدراما الكورية</a>
                </div>
            </li>
        </ul>
    </header>

    <section id="heroSection">
        <div class="slider-wrapper">
            <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original/m9YpS2rE1v24BvQun7zR73L03p9.jpg');">
                <div class="slide-overlay">
                    <div class="news-m" style="display: none;">آخر الأخبار</div>
                    
                    <h1 class="slide-title">The Wrecking Crew</h1>
                    
                    <a href="#" class="hero-btn"><i class="fa-solid fa-play"></i> شاهد الآن</a>

                    <div class="mobile-ui" style="display: none;">
                        <a href="#" class="m-red"><i class="fa-solid fa-compass"></i> تصفح وإكتشف</a>
                        <a href="#" class="m-yellow">العضوية المميزة</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="container">
        <aside class="sidebar">
            <h3 class="side-title">أفلام مختارة</h3>
            <div class="side-item">
                <img src="https://image.tmdb.org/t/p/w500/8O76vV89pLgGkLpntZ341MndE4G.jpg">
                <span>اسم الفيلم</span>
            </div>
        </aside>

        <main class="content">
            <div class="section-box">
                <h2 class="section-title">آخر الحلقات المضافة</h2>
                <div class="grid-display">
                    <div class="item-card">
                        <img src="https://image.tmdb.org/t/p/w500/8O76vV89pLgGkLpntZ341MndE4G.jpg">
                        <div class="item-info">
                            <div class="item-name">The Wrecking Crew 2026</div>
                            <span class="watch-btn">مشاهدة</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <h3 class="side-title">الأكثر مشاهدة</h3>
        </aside>
    </div>

</body>
</html>
