<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Premium Cinema Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #050505; 
            --card-bg: rgba(20, 20, 20, 0.95);
            --transition: 0.3s ease-in-out;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* تأثير التوهج الخلفي */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(155, 81, 224, 0.08) 0%, transparent 85%);
            filter: blur(100px); z-index: -1;
        }

        /* --- الهيدر --- */
        .header { 
            background: rgba(10, 10, 10, 0.98); padding: 12px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(20px);
        }
        .logo-ctn { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .logo-ctn img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary); }

        .main-nav { display: flex; list-style: none; gap: 10px; }
        .nav-item { position: relative; }
        .nav-link { color: #ddd; text-decoration: none; font-size: 14px; font-weight: 600; padding: 10px 15px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .dropdown {
            position: absolute; top: 100%; right: 0; background: #111; min-width: 220px; 
            border-radius: 0 0 8px 8px; border: 1px solid #333; border-top: 2px solid var(--primary);
            display: none; z-index: 1100;
        }
        .nav-item:hover .dropdown { display: block; }
        .dropdown a { color: #eee; padding: 12px 20px; text-decoration: none; display: block; font-size: 13px; text-align: right; border-bottom: 1px solid #222; }

        /* --- السلايدر الرئيسي --- */
        #heroSection { width: 100%; height: 350px; position: relative; overflow: hidden; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center top; position: relative; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-dark) 15%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px 60px; }

        /* --- المحتوى (3 بارات) --- */
        .container { padding: 30px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; }

        /* --- الأقسام (توب سيما ستايل) --- */
        .section-box { position: relative; margin-bottom: 45px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px solid rgba(155, 81, 224, 0.1); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .section-title { color: var(--primary); font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 10px; }

        .carousel-wrapper { position: relative; }
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(155, 81, 224, 0.9); color: white; border: none;
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
            z-index: 10; opacity: 0; transition: 0.3s;
        }
        .carousel-wrapper:hover .nav-btn { opacity: 1; }
        .prev-btn { right: -15px; } .next-btn { left: -15px; }

        .scroll-container { 
            display: flex; overflow-x: auto; gap: 15px; padding: 10px 0;
            scroll-behavior: smooth; scrollbar-width: none; 
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .item-card { min-width: 165px; background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #222; transition: var(--transition); cursor: pointer; position: relative; }
        .item-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(155, 81, 224, 0.2); }
        .item-card img { width: 100%; height: 235px; object-fit: cover; }
        .item-info { padding: 10px; text-align: center; }
        .item-name { font-size: 12px; font-weight: bold; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .watch-btn { background: var(--primary); color: #fff; font-size: 10px; padding: 6px; border-radius: 4px; display: block; font-weight: bold; }

        /* البارات الجانبية */
        .sidebar { background: rgba(10, 10, 10, 0.7); padding: 15px; border-radius: 12px; border: 1px solid rgba(155, 81, 224, 0.1); height: fit-content; }
        .side-title { color: var(--primary); font-size: 14px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 8px; text-align: center; }
        .side-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; font-size: 11px; }
        .side-item:hover { color: var(--primary); transform: scale(1.02); }
        .side-item img { width: 45px; height: 60px; border-radius: 5px; object-fit: cover; border: 1px solid #333; }

        .hidden { display: none !important; }
        #searchBox { display: none; padding: 20px; background: #000; text-align: center; }
        #searchBox input { width: 70%; padding: 12px; border-radius: 25px; border: 1px solid var(--primary); background: #111; color: #fff; outline: none; }

        @media (max-width: 1200px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-ctn">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
            <span style="font-weight: bold; font-size: 22px; letter-spacing: 1px;">WATCHGO</span>
        </a>
        <ul class="main-nav">
            <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
            <li class="nav-item">
                <span class="nav-link">الأفلام <i class="fa-solid fa-chevron-down"></i></span>
                <div class="dropdown">
                    <a href="#" onclick="showCategory('discover/movie', 'أفلام أجنبي', '')">أفلام أجنبي</a>
                    <a href="#" onclick="showCategory('discover/movie', 'أفلام أنمي', '16')">أفلام أنمي</a>
                    <a href="#" onclick="showCategory('discover/movie', 'أفلام آسيوية', '10749')">أفلام آسيوية</a>
                </div>
            </li>
            <li class="nav-item"><a class="nav-link" onclick="showCategory('discover/tv', 'المسلسلات الكاملة', '')">المسلسلات</a></li>
        </ul>
        <div class="header-icons"><i class="fa-solid fa-magnifying-glass" onclick="toggleSearch()" style="cursor:pointer; font-size: 18px;"></i></div>
    </header>

    <div id="searchBox"><input type="text" placeholder="ابحث عن فيلمك أو مسلسلك..." onkeyup="searchApi(this.value)"></div>
    <div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div>

    <div class="container">
        <aside class="sidebar">
            <div class="side-title">أفضل أفلام الشهر</div>
            <div id="bestMoviesSide"></div>
            <br>
            <div class="side-title">أفضل مسلسلات الشهر</div>
            <div id="bestSeriesSide"></div>
        </aside>

        <main class="main-col">
            <div id="homeView">
                <section class="section-box">
                    <div class="section-header"><div class="section-title"><i class="fa-solid fa-clock"></i> أحدث الحلقات المضافة</div></div>
                    <div class="carousel-wrapper">
                        <button class="nav-btn prev-btn" onclick="slide('episodesScroll', 'right')"><i class="fa-solid fa-chevron-right"></i></button>
                        <div class="scroll-container" id="episodesScroll"></div>
                        <button class="nav-btn next-btn" onclick="slide('episodesScroll', 'left')"><i class="fa-solid fa-chevron-left"></i></button>
                    </div>
                </section>

                <section class="section-box">
                    <div class="section-header"><div class="section-title"><i class="fa-solid fa-n"></i> مسلسلات نتفليكس</div></div>
                    <div class="carousel-wrapper">
                        <button class="nav-btn prev-btn" onclick="slide('netflixTVScroll', 'right')"><i class="fa-solid fa-chevron-right"></i></button>
                        <div class="scroll-container" id="netflixTVScroll"></div>
                        <button class="nav-btn next-btn" onclick="slide('netflixTVScroll', 'left')"><i class="fa-solid fa-chevron-left"></i></button>
                    </div>
                </section>

                <section class="section-box">
                    <div class="section-header"><div class="section-title"><i class="fa-solid fa-globe"></i> أحدث الأفلام الأجنبية</div></div>
                    <div class="carousel-wrapper">
                        <button class="nav-btn prev-btn" onclick="slide('moviesScroll', 'right')"><i class="fa-solid fa-chevron-right"></i></button>
                        <div class="scroll-container" id="moviesScroll"></div>
                        <button class="nav-btn next-btn" onclick="slide('moviesScroll', 'left')"><i class="fa-solid fa-chevron-left"></i></button>
                    </div>
                </section>

                <section class="section-box">
                    <div class="section-header"><div class="section-title"><i class="fa-solid fa-earth-asia"></i> القسم الآسيوي</div></div>
                    <div class="carousel-wrapper">
                        <button class="nav-btn prev-btn" onclick="slide('asianScroll', 'right')"><i class="fa-solid fa-chevron-right"></i></button>
                        <div class="scroll-container" id="asianScroll"></div>
                        <button class="nav-btn next-btn" onclick="slide('asianScroll', 'left')"><i class="fa-solid fa-chevron-left"></i></button>
                    </div>
                </section>
            </div>

            <div id="fullView" class="hidden">
                <div class="section-box">
                    <div class="section-header"><div class="section-title" id="fullTitle"></div></div>
                    <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:20px;" id="fullGrid"></div>
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="side-title">أحدث الأنميات</div>
            <div id="animeSide"></div>
            <br>
            <div class="side-title">أفلام نتفليكس</div>
            <div id="netflixMoviesSide"></div>
        </aside>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';

        function toggleSearch() { 
            const s = document.getElementById("searchBox");
            s.style.display = (s.style.display === "block") ? "none" : "block"; 
        }

        function slide(id, direction) {
            const container = document.getElementById(id);
            container.scrollBy({ left: direction === 'left' ? -400 : 400, behavior: 'smooth' });
        }

        function createCard(m, type) {
            return `
                <div class="item-card" onclick="location.href='movie.html?id=${m.id}&type=${type}'">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="item-info">
                        <div class="item-name">${m.title || m.name}</div>
                        <div class="watch-btn">شاهد الآن</div>
                    </div>
                </div>`;
        }

        function createSideItem(m, type) {
            return `
                <div class="side-item" onclick="location.href='movie.html?id=${m.id}&type=${type}'">
                    <img src="https://image.tmdb.org/t/p/w200${m.poster_path}">
                    <div>${m.title || m.name}</div>
                </div>`;
        }

        async function init() {
            // السلايدر
            const pop = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}`);
            const popData = await pop.json();
            renderSlider(popData.results.slice(0, 5));

            // الأقسام الرئيسية (Carousel)
            const ep = await fetch(`${BASE_URL}/tv/on_the_air?api_key=${API_KEY}`);
            const epData = await ep.json();
            document.getElementById('episodesScroll').innerHTML = epData.results.map(m => createCard(m, 'tv')).join('');

            const netTV = await fetch(`${BASE_URL}/discover/tv?api_key=${API_KEY}&with_networks=213`);
            const netTVData = await netTV.json();
            document.getElementById('netflixTVScroll').innerHTML = netTVData.results.map(m => createCard(m, 'tv')).join('');

            document.getElementById('moviesScroll').innerHTML = popData.results.map(m => createCard(m, 'movie')).join('');

            const asian = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_original_language=ko|ja|zh`);
            const asianData = await asian.json();
            document.getElementById('asianScroll').innerHTML = asianData.results.map(m => createCard(m, 'movie')).join('');

            // البارات الجانبية (أفضل أعمال الشهر وغيرها)
            const bestM = await fetch(`${BASE_URL}/movie/top_rated?api_key=${API_KEY}`);
            const bestMData = await bestM.json();
            document.getElementById('bestMoviesSide').innerHTML = bestMData.results.slice(0, 5).map(m => createSideItem(m, 'movie')).join('');

            const bestS = await fetch(`${BASE_URL}/tv/top_rated?api_key=${API_KEY}`);
            const bestSData = await bestS.json();
            document.getElementById('bestSeriesSide').innerHTML = bestSData.results.slice(0, 5).map(m => createSideItem(m, 'tv')).join('');

            const ani = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=16`);
            const aniData = await ani.json();
            document.getElementById('animeSide').innerHTML = aniData.results.slice(0, 6).map(m => createSideItem(m, 'movie')).join('');

            const netM = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_networks=213`);
            const netMData = await netM.json();
            document.getElementById('netflixMoviesSide').innerHTML = netMData.results.slice(0, 6).map(m => createSideItem(m, 'movie')).join('');
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay"><h2>${m.title}</h2></div>
                </div>`).join('');
            let i = 0; setInterval(() => { i = (i + 1) % 5; wrapper.style.transform = `translateX(${i * 100}%)`; }, 5000);
        }

        async function showCategory(endpoint, title, genreId) {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('fullView').classList.remove('hidden');
            document.getElementById('fullTitle').innerText = title;
            let url = `${BASE_URL}/${endpoint}?api_key=${API_KEY}&language=en-US`;
            if(genreId) url += `&with_genres=${genreId}`;
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('fullGrid').innerHTML = data.results.map(m => createCard(m, endpoint.includes('tv') ? 'tv' : 'movie')).join('');
            window.scrollTo({ top: 350, behavior: 'smooth' });
        }

        init();
    </script>
</body>
</html>
