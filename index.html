<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Premium Cinema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #050505; 
            --card-bg: rgba(20, 20, 20, 0.95);
            --text: #ffffff;
            --glass: rgba(155, 81, 224, 0.05);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* خلفية الـ Glow */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(155, 81, 224, 0.08) 0%, transparent 80%);
            filter: blur(100px); z-index: -1;
        }

        /* --- الهيدر --- */
        .header { 
            background: rgba(10, 10, 10, 0.95); padding: 10px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
        }
        .logo-ctn { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .logo-ctn img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }

        .main-nav { display: flex; list-style: none; }
        .nav-item { position: relative; }
        .nav-link { color: #ddd; text-decoration: none; font-size: 14px; font-weight: 600; padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .nav-link:hover { color: var(--primary); }

        .dropdown {
            position: absolute; top: 100%; right: 0; background: #111; min-width: 200px; 
            border-radius: 0 0 8px 8px; border: 1px solid #333; border-top: 2px solid var(--primary);
            display: none; z-index: 1100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item:hover .dropdown { display: block; }
        .dropdown a { color: #eee; padding: 12px 20px; text-decoration: none; display: block; font-size: 13px; text-align: right; border-bottom: 1px solid #222; }
        .dropdown a:hover { background: #1a1a1a; color: var(--primary); }

        /* --- السلايدر --- */
        #heroSection { width: 100%; height: 300px; position: relative; overflow: hidden; background: #000; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s ease; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center top; position: relative; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-dark) 5%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px 60px; }

        /* --- تنظيم الأقسام الرئيسية --- */
        .container { padding: 20px 40px; display: grid; grid-template-columns: 1fr 280px; gap: 30px; }
        .main-col { display: flex; flex-direction: column; gap: 40px; }

        .section-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-right: 4px solid var(--primary); padding-right: 15px;
        }
        .section-header h3 { font-size: 18px; color: var(--primary); text-transform: uppercase; }

        /* شبكة الأفلام */
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        
        .item-card { 
            background: var(--card-bg); border-radius: 10px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.03); transition: var(--transition); cursor: pointer; position: relative;
        }
        .item-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(155, 81, 224, 0.2); }
        .item-card img { width: 100%; height: 220px; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; background: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .item-info { padding: 10px; text-align: center; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* الجانب الأيمن */
        .sidebar { background: rgba(10, 10, 10, 0.5); padding: 20px; border-radius: 12px; border: 1px solid rgba(155, 81, 224, 0.1); height: fit-content; }
        .side-title { color: var(--primary); font-size: 16px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        #searchBox { display: none; padding: 20px; background: #0a0a0a; text-align: center; }
        #searchBox input { width: 70%; padding: 12px 25px; border-radius: 30px; border: 1px solid var(--primary); background: #111; color: #fff; outline: none; }

        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-ctn">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
            <span style="font-weight: bold;">WATCHGO</span>
        </a>

        <ul class="main-nav">
            <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
            <li class="nav-item">
                <span class="nav-link">الأفلام <i class="fa-solid fa-chevron-down"></i></span>
                <div class="dropdown">
                    <a href="#foreign-movies">أفلام أجنبي</a>
                    <a href="#anime-movies">أفلام أنمي</a>
                    <a href="#asian-movies">أفلام آسيوية</a>
                    <a href="#netflix-movies">أفلام نتفليكس</a>
                </div>
            </li>
            <li class="nav-item">
                <span class="nav-link">المسلسلات <i class="fa-solid fa-chevron-down"></i></span>
                <div class="dropdown">
                    <a href="#foreign-series">مسلسلات أجنبي</a>
                    <a href="#netflix-series">مسلسلات نتفليكس</a>
                </div>
            </li>
            <li class="nav-item"><a class="nav-link">القسم الآسيوي</a></li>
        </ul>

        <div class="header-icons"><i class="fa-solid fa-magnifying-glass" onclick="toggleSearch()" style="cursor:pointer"></i></div>
    </header>

    <div id="searchBox"><input type="text" id="searchInput" placeholder="ابحث عن فيلم أو مسلسل..." onkeyup="searchApi(this.value)"></div>

    <div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div>

    <div class="container">
        <div class="main-col">
            <section id="netflix-movies">
                <div class="section-header"><h3><i class="fa-solid fa-n"></i> أفلام نتفليكس</h3></div>
                <div class="movies-grid" id="netflixGrid"></div>
            </section>

            <section id="foreign-movies">
                <div class="section-header"><h3><i class="fa-solid fa-globe"></i> أفلام أجنبي حديثة</h3></div>
                <div class="movies-grid" id="foreignGrid"></div>
            </section>

            <section id="anime-movies">
                <div class="section-header"><h3><i class="fa-solid fa-ghost"></i> أفلام أنمي</h3></div>
                <div class="movies-grid" id="animeGrid"></div>
            </section>

            <section id="foreign-series">
                <div class="section-header"><h3><i class="fa-solid fa-tv"></i> مسلسلات أجنبي</h3></div>
                <div class="movies-grid" id="seriesGrid"></div>
            </section>
        </div>

        <aside class="sidebar">
            <div class="side-title"><i class="fa-solid fa-fire"></i> الأكثر مشاهدة</div>
            <div id="trendingSidebar"></div>
        </aside>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';

        function toggleSearch() {
            const s = document.getElementById('searchBox');
            s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        }

        async function fetchData(endpoint, gridId, isSeries = false) {
            const res = await fetch(`${BASE_URL}/${endpoint}&api_key=${API_KEY}&language=en-US`);
            const data = await res.json();
            const grid = document.getElementById(gridId);
            grid.innerHTML = data.results.slice(0, 6).map(m => `
                <div class="item-card" onclick="location.href='movie.html?id=${m.id}&type=${isSeries ? 'tv' : 'movie'}'">
                    <div class="badge">4K</div>
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="item-info">${m.title || m.name}</div>
                </div>
            `).join('');
            return data.results;
        }

        async function init() {
            // السلايدر (أفلام مشهورة)
            const popular = await fetchData('movie/popular?', 'foreignGrid');
            renderSlider(popular.slice(0, 5));

            // الأقسام المختلفة في الصفحة الرئيسية
            fetchData('discover/movie?with_networks=213', 'netflixGrid'); // نتفليكس
            fetchData('discover/movie?with_genres=16', 'animeGrid'); // أنمي
            fetchData('tv/popular?', 'seriesGrid', true); // مسلسلات
            
            // القائمة الجانبية
            const trending = await fetch(`${BASE_URL}/trending/all/day?api_key=${API_KEY}`);
            const tData = await trending.json();
            document.getElementById('trendingSidebar').innerHTML = tData.results.slice(0, 8).map(m => `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; cursor:pointer;" onclick="location.href='movie.html?id=${m.id}&type=${m.media_type}'">
                    <img src="https://image.tmdb.org/t/p/w200${m.poster_path}" style="width:40px; height:55px; border-radius:4px; object-fit:cover;">
                    <div style="font-size:11px; font-weight:600; color:#ccc;">${m.title || m.name}</div>
                </div>
            `).join('');
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay"><h2 style="font-size:26px;">${m.title}</h2></div>
                </div>
            `).join('');
            let i = 0; setInterval(() => { i = (i + 1) % 5; wrapper.style.transform = `translateX(${i * 100}%)`; }, 5000);
        }

        async function searchApi(query) {
            if(query.length < 2) return;
            const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${query}&language=en-US`);
            const data = await res.json();
            // عرض نتائج البحث في أول شبكة موجودة
            document.getElementById('netflixGrid').parentElement.scrollIntoView();
            document.getElementById('netflixGrid').innerHTML = data.results.slice(0, 12).map(m => `
                <div class="item-card" onclick="location.href='movie.html?id=${m.id}&type=${m.media_type}'">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="item-info">${m.title || m.name}</div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
