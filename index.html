<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - الإصدار الاحترافي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg: #050505; 
            --card-bg: #111; 
            --text: #fff;
            --transition: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* --- الهيدر الرئيسي --- */
        .header { 
            background: rgba(10, 10, 10, 0.95); padding: 10px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; 
            backdrop-filter: blur(10px);
        }
        
        .right-section { display: flex; align-items: center; gap: 30px; }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-container img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }
        .logo-text { font-size: 20px; font-weight: bold; color: var(--text); text-decoration: none; }

        /* --- القائمة العلوية الجديدة --- */
        .nav-menu { display: flex; list-style: none; gap: 20px; }
        .nav-item { position: relative; }
        .nav-link { 
            color: #ccc; text-decoration: none; font-size: 15px; font-weight: 600; 
            padding: 10px 5px; transition: var(--transition); cursor: pointer;
        }
        .nav-link:hover { color: var(--primary); }
        .nav-link i { font-size: 12px; margin-right: 5px; }

        /* القائمة المنسدلة (Dropdown) */
        .dropdown-content {
            display: none; position: absolute; top: 100%; right: 0; 
            background: #111; min-width: 180px; border-radius: 8px;
            border: 1px solid #333; box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 1000;
        }
        .dropdown-content a {
            color: #eee; padding: 12px 16px; text-decoration: none; display: block;
            font-size: 14px; border-bottom: 1px solid #222; transition: 0.2s;
        }
        .dropdown-content a:hover { background: var(--primary); color: #fff; }
        .nav-item:hover .dropdown-content { display: block; }

        .header-icons { display: flex; gap: 20px; align-items: center; }
        .icon-btn { font-size: 20px; cursor: pointer; color: #fff; transition: var(--transition); }
        .icon-btn:hover { color: var(--primary); }

        /* --- صندوق البحث --- */
        #searchBox { display: none; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        #searchBox input { width: 100%; max-width: 600px; margin: 0 auto; display: block; padding: 12px; border-radius: 25px; border: 1px solid var(--primary); background: #111; color: #fff; text-align: center; }

        /* --- السلايدر --- */
        .hero-slider { width: 100%; height: 450px; position: relative; overflow: hidden; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.7s ease; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #050505, transparent); display: flex; flex-direction: column; justify-content: flex-end; padding: 60px; }
        .slide-title { font-size: 35px; font-weight: bold; margin-bottom: 15px; }
        .slide-btn { background: var(--primary); color: white; padding: 12px 25px; border-radius: 5px; text-decoration: none; width: fit-content; font-weight: bold; }

        /* --- شبكة الأفلام --- */
        .main-content { max-width: 1400px; margin: 0 auto; padding: 30px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-right: 4px solid var(--primary); padding-right: 15px; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; }
        
        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: var(--transition); border: 1px solid #222; position: relative; }
        .movie-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 25px rgba(155, 81, 224, 0.3); }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; }
        .movie-card-info { padding: 12px; text-align: center; }
        .movie-card-title { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 10px; }
        .watch-btn { display: block; background: var(--primary); color: #fff; padding: 10px; text-decoration: none; border-radius: 6px; font-size: 13px; font-weight: bold; }

        /* التجاوب مع الموبايل */
        @media (max-width: 900px) {
            .nav-menu { display: none; } /* تخفي القائمة الكبيرة في الموبايل وممكن ترجعها كزر */
            .header { padding: 10px 20px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="right-section">
            <a href="index.html" class="logo-container">
                <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
                <span class="logo-text">WATCHGO</span>
            </a>

            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">الرئيسية</a></li>
                
                <li class="nav-item">
                    <span class="nav-link">أفلام أجنبي <i class="fa-solid fa-chevron-down"></i></span>
                    <div class="dropdown-content">
                        <a href="#" onclick="fetchApi('movie/top_rated')">الأعلى تقييماً ⭐</a>
                        <a href="#" onclick="fetchApi('discover/movie', '28')">أكشن</a>
                        <a href="#" onclick="fetchApi('discover/movie', '27')">رعب</a>
                    </div>
                </li>

                <li class="nav-item">
                    <span class="nav-link">مسلسلات <i class="fa-solid fa-chevron-down"></i></span>
                    <div class="dropdown-content">
                        <a href="#" onclick="fetchApi('tv/popular')">الأكثر شهرة</a>
                        <a href="#" onclick="fetchApi('tv/top_rated')">الأعلى تقييماً ⭐</a>
                    </div>
                </li>

                <li class="nav-item"><a href="#" class="nav-link" onclick="fetchApi('discover/movie', '16')">أنمي</a></li>
            </ul>
        </div>

        <div class="header-icons">
            <i class="fa-solid fa-magnifying-glass icon-btn" onclick="toggleSearch()"></i>
            <i class="fa-solid fa-heart icon-btn" style="color: var(--primary);"></i>
        </div>
    </header>

    <div id="searchBox">
        <input type="text" id="searchInput" placeholder="ابحث عن فيلمك المفضل..." onkeyup="searchApi(this.value)">
    </div>

    <div class="hero-slider">
        <div class="slider-wrapper" id="sliderWrapper"></div>
    </div>

    <div class="main-content">
        <div class="section-header">
            <h2 class="section-title">آخر الإضافات</h2>
        </div>
        <div class="movies-grid" id="moviesGrid"></div>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';

        function toggleSearch() { 
            const s = document.getElementById("searchBox");
            s.style.display = (s.style.display === "block") ? "none" : "block"; 
        }

        async function fetchApi(endpoint, genre = '') {
            let url = `${BASE_URL}/${endpoint}?api_key=${API_KEY}&language=en-US`;
            if(genre) url += `&with_genres=${genre}`;
            const res = await fetch(url);
            const data = await res.json();
            renderMovies(data.results);
            if(endpoint === 'movie/popular') renderSlider(data.results.slice(0, 5));
        }

        async function searchApi(query) {
            if(query.length < 2) return;
            const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${query}`);
            const data = await res.json();
            renderMovies(data.results);
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay">
                        <div class="slide-title">${m.title || m.name}</div>
                        <a href="movie.html?id=${m.id}&type=movie" class="slide-btn">شاهد الآن</a>
                    </div>
                </div>
            `).join('');

            let i = 0;
            setInterval(() => {
                i = (i + 1) % movies.length;
                wrapper.style.transform = `translateX(${i * 100}%)`;
            }, 5000);
        }

        function renderMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = movies.filter(m => m.poster_path).map(m => `
                <div class="movie-card">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" alt="${m.title || m.name}">
                    <div class="movie-card-info">
                        <div class="movie-card-title">${m.title || m.name}</div>
                        <a href="movie.html?id=${m.id}&type=${m.title ? 'movie' : 'tv'}" class="watch-btn">مشاهدة</a>
                    </div>
                </div>
            `).join('');
        }

        fetchApi('movie/popular');
    </script>
</body>
</html>s
