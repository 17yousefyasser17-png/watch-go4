<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Pro Cinema Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #070707; 
            --card-bg: #111;
            --border-color: #222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* --- الهيدر --- */
        .header { 
            background: #000; padding: 0 40px; height: 75px;
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 2000;
        }
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; flex-shrink: 0; }
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }

        .main-nav { display: flex; list-style: none; height: 100%; align-items: center; gap: 5px; }
        .nav-item { position: relative; height: 100%; display: flex; align-items: center; }
        .nav-link { 
            color: #eee; text-decoration: none; font-size: 14px; font-weight: 600; 
            padding: 0 12px; cursor: pointer; display: flex; align-items: center; gap: 6px;
            height: 100%; transition: 0.3s;
        }
        .nav-link:hover { color: var(--primary); background: rgba(155, 81, 224, 0.05); }

        .dropdown { 
            position: absolute; top: 75px; right: 0; background: #0a0a0a; min-width: 180px; 
            border-top: 3px solid var(--primary); display: none; flex-direction: column; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.9); z-index: 3000;
        }
        .nav-item:hover .dropdown { display: flex; }
        .dropdown a { color: #ccc; padding: 12px 20px; text-decoration: none; font-size: 13px; border-bottom: 1px solid #1a1a1a; text-align: right; }
        .dropdown a:hover { background: #151515; color: var(--primary); }

        .header-icons { display: flex; align-items: center; gap: 15px; }
        .icon-btn { color: #ccc; cursor: pointer; font-size: 18px; transition: 0.3s; }

        /* --- السلايدر --- */
        .slider-container { max-width: 1620px; margin: 20px auto; padding: 0 40px; }
        #heroSection { width: 100%; height: 420px; position: relative; overflow: hidden; border-radius: 15px; border: 1px solid var(--border-color); background: #000; shadow: 0 0 20px rgba(155, 81, 224, 0.2); }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center 20%; position: relative; }
        .slide-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(7,7,7,1) 5%, transparent 70%); 
            display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; 
        }
        .slide-title { font-size: 32px; font-weight: 900; margin-bottom: 15px; text-shadow: 2px 2px 10px #000; }

        .hero-btn { background: var(--primary); color: white; text-decoration: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; width: fit-content; }

        /* --- كارت الفيلم مع Hover التفاصيل --- */
        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        
        .item-card { 
            background: var(--card-bg); border-radius: 8px; overflow: visible; 
            border: 1px solid var(--border-color); transition: 0.4s ease; 
            cursor: pointer; position: relative; z-index: 1;
        }

        .item-card:hover { 
            transform: scale(1.15); z-index: 100; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            border-color: var(--primary);
        }

        .item-card img { width: 100%; height: 260px; object-fit: cover; border-radius: 8px 8px 0 0; }
        
        .hover-details {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(15, 15, 15, 0.98); padding: 15px 12px;
            opacity: 0; visibility: hidden; transition: 0.3s;
            border-top: 1px solid var(--primary); border-radius: 0 0 8px 8px;
            max-height: 100%; overflow: hidden;
        }

        .item-card:hover .hover-details { opacity: 1; visibility: visible; }

        .item-name { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #fff; text-align: center; }
        
        .item-story { font-size: 10px; color: #ccc; line-height: 1.4; margin-bottom: 10px; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; text-align: center; }

        .meta-info { display: flex; justify-content: center; gap: 8px; font-size: 9px; color: #aaa; margin-bottom: 10px; }
        .meta-info span { border: 1px solid #333; padding: 2px 5px; border-radius: 3px; background: #000; }

        .watch-btn { 
            background: var(--primary); color: #fff; font-size: 11px; padding: 8px; 
            border-radius: 4px; font-weight: bold; display: block; text-align: center; text-decoration: none;
        }

        /* الحاويات والسايد بار */
        .container { padding: 20px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; max-width: 1700px; margin: 0 auto; }
        .section-box { margin-bottom: 40px; }
        .section-title { background: #111; padding: 12px 20px; font-size: 17px; font-weight: bold; margin-bottom: 20px; border-right: 5px solid var(--primary); display: flex; align-items: center; gap: 10px; }
        
        .sidebar { background: #111; border: 1px solid var(--border-color); border-radius: 8px; height: fit-content; position: sticky; top: 90px; }
        .side-title { background: #1a1a1a; color: var(--primary); font-size: 13px; font-weight: bold; padding: 12px; border-bottom: 1px solid var(--border-color); text-align: center; }
        .side-list { padding: 10px; }
        .side-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .side-item img { width: 45px; height: 65px; border-radius: 4px; object-fit: cover; }
        .side-item .txt { font-size: 11px; color: #ccc; }

        #searchBox { background: #000; border-bottom: 1px solid var(--primary); padding: 15px; display: none; }
        #searchBox input { width: 50%; padding: 10px 20px; background: #111; border: 1px solid var(--primary); color: #fff; border-radius: 30px; outline: none; }

        .hidden { display: none !important; }

        @media (max-width: 1200px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } .main-nav { display: none; } }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-ctn">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
            <span style="font-weight: bold; font-size: 22px;">WATCH<span style="color: var(--primary);">GO</span></span>
        </a>

        <nav class="main-nav">
            <div class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></div>
            <div class="nav-item">
                <span class="nav-link">الأفلام <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i></span>
                <div class="dropdown">
                    <a href="#" onclick="showCategory('discover/movie', 'Foreign Movies', 'en')">أفلام أجنبي</a>
                    <a href="#" onclick="showCategory('discover/movie', 'أفلام عربية', 'ar')">أفلام عربي ومصري</a>
                </div>
            </div>
            <div class="nav-item">
                <span class="nav-link">المسلسلات <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i></span>
                <div class="dropdown">
                    <a href="#" onclick="showCategory('discover/tv', 'مسلسلات رمضان 2026', 'ramadan')">مسلسلات رمضان 2026</a>
                </div>
            </div>
            <div class="nav-item"><a class="nav-link" href="#" onclick="showCategory('discover/movie', 'Anime World', '16')">أنمي</a></div>
        </nav>

        <div class="header-icons">
            <i class="fa-solid fa-magnifying-glass icon-btn" onclick="toggleSearch()"></i>
            <i class="fa-solid fa-bars icon-btn" style="margin-right: 10px;"></i>
        </div>
    </header>

    <div id="searchBox">
        <center><input type="text" id="searchInput" placeholder="ابحث..." onkeyup="searchApi(this.value)"></center>
    </div>
    
    <div class="slider-container">
        <div id="heroSection">
            <div class="slider-wrapper" id="sliderWrapper"></div>
        </div>
    </div>

    <div class="container">
        <aside class="sidebar">
            <div class="side-title">أعلى التقييمات</div>
            <div class="side-list" id="bestMoviesSide"></div>
        </aside>

        <main class="main-col">
            <div id="homeView">
                <section class="section-box">
                    <div class="section-title"><span><i class="fa-solid fa-moon" style="color: #f1c40f;"></i> مسلسلات رمضان 2026</span></div>
                    <div class="grid-display" id="ramadanGrid"></div>
                </section>

                <section class="section-box">
                    <div class="section-title"><span><i class="fa-solid fa-flag" style="color: #e74c3c;"></i> أفلام عربية ومصرية</span></div>
                    <div class="grid-display" id="arabicMoviesGrid"></div>
                </section>

                <section class="section-box">
                    <div class="section-title"><span><i class="fa-solid fa-fire" style="color: #ff4757;"></i> أفلام عالمية مختارة</span></div>
                    <div class="grid-display" id="moviesGrid"></div>
                </section>
            </div>

            <div id="fullView" class="hidden">
                <div class="section-box">
                    <div class="section-title" id="fullTitle">نتائج البحث</div>
                    <div class="grid-display" id="fullGrid"></div>
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="side-title">عالم الأنمي</div>
            <div class="side-list" id="animeSide"></div>
        </aside>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';

        function toggleSearch() { 
            const s = document.getElementById("searchBox");
            s.style.display = (s.style.display === "block") ? "none" : "block";
        }

        function createCard(m, type, isArabic = false) {
            const date = m.release_date || m.first_air_date || '2025';
            const year = date.split('-')[0];
            const name = m.title || m.name;
            const story = m.overview || (isArabic ? "لا يوجد وصف حالياً" : "No description available.");
            
            return `
                <div class="item-card" onclick="location.href='movie.html?id=${m.id}&type=${type}'">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" loading="lazy">
                    <div class="hover-details">
                        <div class="item-name">${name}</div>
                        <p class="item-story">${story}</p>
                        <div class="meta-info">
                            <span>${year}</span>
                            <span>${isArabic ? 'عربي' : 'EN'}</span>
                            <span style="color: #f1c40f;"><i class="fa-solid fa-star"></i> ${m.vote_average.toFixed(1)}</span>
                        </div>
                        <div class="watch-btn">شاهد الآن</div>
                    </div>
                </div>`;
        }

        async function init() {
            // بيانات أجنبية
            const pop = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=en-US`);
            const popData = await pop.json();
            
            // بيانات عربية (أسماء وقصة بالعربي)
            const ara = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_original_language=ar&language=ar-SA&sort_by=primary_release_date.desc`);
            const araData = await ara.json();
            
            renderSlider([...popData.results.slice(0, 3), ...araData.results.slice(0, 2)]);

            document.getElementById('moviesGrid').innerHTML = popData.results.slice(0, 12).map(m => createCard(m, 'movie', false)).join('');
            document.getElementById('arabicMoviesGrid').innerHTML = araData.results.slice(0, 6).map(m => createCard(m, 'movie', true)).join('');

            const ramadan = await fetch(`${BASE_URL}/discover/tv?api_key=${API_KEY}&with_original_language=ar&language=ar-SA&first_air_date_year=2025`);
            const ramadanData = await ramadan.json();
            document.getElementById('ramadanGrid').innerHTML = ramadanData.results.slice(0, 6).map(m => createCard(m, 'tv', true)).join('');

            // Sidebar
            const bestM = await fetch(`${BASE_URL}/movie/top_rated?api_key=${API_KEY}&language=en-US`);
            const bestMData = await bestM.json();
            document.getElementById('bestMoviesSide').innerHTML = bestMData.results.slice(0, 8).map(m => `
                <div class="side-item" onclick="location.href='movie.html?id=${m.id}&type=movie'">
                    <img src="https://image.tmdb.org/t/p/w200${m.poster_path}">
                    <div class="txt">${m.title}</div>
                </div>`).join('');

            const ani = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=16&language=en-US`);
            const aniData = await ani.json();
            document.getElementById('animeSide').innerHTML = aniData.results.slice(0, 8).map(m => `
                <div class="side-item" onclick="location.href='movie.html?id=${m.id}&type=movie'">
                    <img src="https://image.tmdb.org/t/p/w200${m.poster_path}">
                    <div class="txt">${m.title}</div>
                </div>`).join('');
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay">
                        <h2 class="slide-title">${m.title || m.name}</h2>
                        <a href="movie.html?id=${m.id}&type=${m.title ? 'movie' : 'tv'}" class="hero-btn" style="text-decoration:none;">شاهد الآن</a>
                    </div>
                </div>`).join('');
            let i = 0; setInterval(() => { i = (i + 1) % movies.length; wrapper.style.transform = `translateX(${i * 100}%)`; }, 5000);
        }

        async function showCategory(endpoint, title, lang) {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('fullView').classList.remove('hidden');
            document.getElementById('fullTitle').innerText = title;
            let url = `${BASE_URL}/${endpoint}?api_key=${API_KEY}&language=${lang === 'ar' || lang === 'ramadan' ? 'ar-SA' : 'en-US'}`;
            if(lang === 'ar') url += `&with_original_language=ar`;
            else if(lang === 'ramadan') url += `&with_original_language=ar&first_air_date_year=2025`;
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('fullGrid').innerHTML = data.results.map(m => createCard(m, endpoint.includes('tv') ? 'tv' : 'movie', lang === 'ar' || lang === 'ramadan')).join('');
        }

        init();
    </script>
</body>
</html>
