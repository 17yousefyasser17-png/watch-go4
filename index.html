<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - المظهر النهائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #050505; 
            --card-bg: rgba(17, 17, 17, 0.9);
            --text: #ffffff;
            --transition: 0.4s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            /* خلفية ثابتة مجمعة للأفلام */
            background-image: url('https://i.ibb.co/LhqZ88Y/movie-collage-wallpaper.jpg'); 
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow-x: hidden;
        }

        /* طبقة تعتيم الخلفية لضمان وضوح النصوص */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.85);
            z-index: -1;
        }

        /* --- الهيدر الاحترافي (نفس ستايل توب سينما) --- */
        .header { 
            background: rgba(10, 10, 10, 0.95); 
            padding: 10px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); 
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(15px);
        }
        
        .nav-right { display: flex; align-items: center; gap: 30px; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }
        .logo span { font-size: 20px; font-weight: bold; letter-spacing: 1px; }

        /* القائمة العلوية الأفقية */
        .main-nav { display: flex; list-style: none; gap: 20px; }
        .nav-item { position: relative; }
        .nav-link { 
            color: #ddd; text-decoration: none; font-size: 15px; font-weight: 600; 
            padding: 10px 5px; transition: var(--transition); cursor: pointer;
        }
        .nav-link:hover { color: var(--primary); }
        .nav-link i { font-size: 12px; margin-right: 5px; }

        /* القائمة المنسدلة (Dropdown) */
        .dropdown {
            display: none; position: absolute; top: 100%; right: 0; 
            background: #111; min-width: 180px; border-radius: 8px;
            border: 1px solid #333; box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 1000;
        }
        .dropdown a {
            color: #eee; padding: 12px 16px; text-decoration: none; display: block;
            font-size: 14px; border-bottom: 1px solid #222; transition: 0.2s;
        }
        .dropdown a:hover { background: var(--primary); color: #fff; }
        .nav-item:hover .dropdown { display: block; }

        .header-icons { display: flex; gap: 20px; align-items: center; }
        .icon-btn { font-size: 20px; cursor: pointer; color: #fff; transition: var(--transition); }
        .icon-btn:hover { color: var(--primary); }

        /* --- صندوق البحث --- */
        #searchBox { display: none; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; text-align: center; }
        #searchBox input { width: 100%; max-width: 600px; padding: 12px; border-radius: 25px; border: 1px solid var(--primary); background: #111; color: #fff; text-align: center; outline: none; }

        /* --- السلايدر المصغر وبدون فواصل --- */
        .hero-slider { 
            width: 100%; 
            height: 350px; /* تصغير الحجم */
            position: relative; 
            overflow: hidden; 
            margin-bottom: 0; /* إلغاء الفاصل */
        }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .slide-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg-dark), transparent); 
            display: flex; flex-direction: column; justify-content: flex-end; padding: 40px 60px; 
        }
        .slide-title { font-size: 30px; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }

        /* --- شبكة الأفلام --- */
        .main-content { padding: 30px 40px; position: relative; }
        .section-title { 
            background: var(--primary); display: inline-block; padding: 5px 20px; 
            border-radius: 5px; font-size: 16px; font-weight: bold; margin-bottom: 30px; 
        }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 25px; }
        
        .movie-card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; 
            transition: var(--transition); border: 1px solid #333; position: relative; 
        }
        .movie-card:hover { 
            transform: scale(1.08); border-color: var(--primary); 
            box-shadow: 0 10px 30px rgba(155, 81, 224, 0.4);
            z-index: 10;
        }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; }
        .movie-info { padding: 12px; text-align: center; }
        .movie-name { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 900px) {
            .main-nav { display: none; }
            .header { padding: 10px 20px; }
            .hero-slider { height: 250px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="nav-right">
            <a href="index.html" class="logo">
                <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg" alt="Logo">
                <span>WATCHGO</span>
            </a>

            <ul class="main-nav">
                <li class="nav-item"><a href="index.html" class="nav-link">الرئيسية</a></li>
                <li class="nav-item">
                    <span class="nav-link">أفلام أجنبي <i class="fa-solid fa-chevron-down"></i></span>
                    <div class="dropdown">
                        <a href="#" onclick="fetchMovies('movie/top_rated')">الأعلى تقييماً IMDB</a>
                        <a href="#" onclick="fetchMovies('discover/movie', '28')">أفلام أكشن</a>
                        <a href="#" onclick="fetchMovies('discover/movie', '27')">أفلام رعب</a>
                        <a href="#" onclick="fetchMovies('discover/movie', '10749')">أفلام رومانسية</a>
                    </div>
                </li>
                <li class="nav-item">
                    <span class="nav-link">مسلسلات <i class="fa-solid fa-chevron-down"></i></span>
                    <div class="dropdown">
                        <a href="#" onclick="fetchMovies('tv/popular')">مسلسلات أجنبي</a>
                        <a href="#" onclick="fetchMovies('tv/top_rated')">الأعلى تقييماً</a>
                        <a href="#" onclick="fetchMovies('discover/tv', '16')">مسلسلات أنمي</a>
                    </div>
                </li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="fetchMovies('discover/movie', '16')">أنمي & كرتون</a></li>
                <li class="nav-item"><a href="#" class="nav-link">القسم الآسيوي</a></li>
            </ul>
        </div>

        <div class="header-icons">
            <i class="fa-solid fa-magnifying-glass icon-btn" onclick="toggleSearch()"></i>
            <i class="fa-solid fa-heart icon-btn" style="color: var(--primary);"></i>
        </div>
    </header>

    <div id="searchBox">
        <input type="text" id="searchInput" placeholder="ابحث عن أفلام أو مسلسلات..." onkeyup="searchMovies(this.value)">
    </div>

    <div class="hero-slider">
        <div class="slider-wrapper" id="sliderWrapper"></div>
    </div>

    <div class="main-content">
        <div class="section-title">المضاف حديثاً</div>
        <div class="movies-grid" id="moviesGrid"></div>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';

        function toggleSearch() {
            const box = document.getElementById('searchBox');
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
        }

        async function fetchMovies(endpoint, genreId = '') {
            let url = `${BASE_URL}/${endpoint}?api_key=${API_KEY}&language=en-US`;
            if(genreId) url += `&with_genres=${genreId}`;
            
            const res = await fetch(url);
            const data = await res.json();
            renderMovies(data.results);
            
            if(endpoint === 'movie/popular') {
                renderSlider(data.results.slice(0, 5));
            }
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay">
                        <div class="slide-title">${m.title || m.name}</div>
                    </div>
                </div>
            `).join('');

            let i = 0;
            setInterval(() => {
                i = (i + 1) % 5;
                wrapper.style.transform = `translateX(${i * 100}%)`;
            }, 5000);
        }

        function renderMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = movies.filter(m => m.poster_path).map(m => `
                <div class="movie-card">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" alt="${m.title}">
                    <div class="movie-info">
                        <div class="movie-name">${m.title || m.name}</div>
                    </div>
                </div>
            `).join('');
        }

        async function searchMovies(query) {
            if(query.length < 2) return;
            const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${query}`);
            const data = await res.json();
            renderMovies(data.results);
        }

        // تشغيل الموقع عند التحميل
        fetchMovies('movie/popular');
    </script>
</body>
</html>
