<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - الإصدار المعتمد</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg: #050505; 
            --card-bg: #111; 
            --text: #fff;
            --transition: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* --- الهيدر --- */
        .header { 
            background: rgba(10, 10, 10, 0.95); padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-container img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }
        .logo-text { font-size: 20px; font-weight: bold; letter-spacing: 1px; }
        .header-icons { display: flex; gap: 18px; align-items: center; }
        .icon-btn { font-size: 20px; cursor: pointer; color: #fff; transition: var(--transition); }
        .icon-btn:hover { color: var(--primary); }

        /* --- صندوق البحث --- */
        #searchBox { display: none; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        #searchBox input { width: 100%; max-width: 600px; margin: 0 auto; display: block; padding: 12px; border-radius: 25px; border: 1px solid var(--primary); background: #111; color: #fff; text-align: center; }

        /* --- السلايدر (التلقائي) --- */
        .hero-slider { width: 100%; height: 400px; position: relative; overflow: hidden; background: #000; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.7s ease-in-out; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #050505, transparent); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; }
        .slide-title { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .slide-btn { background: var(--primary); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; width: fit-content; font-weight: bold; }

        /* --- القائمة الجانبية (ستايل TopCinema) --- */
        .side-nav { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0; background: #0d0d0d; transition: 0.4s; padding-top: 60px; overflow-x: hidden; border-left: 2px solid var(--primary); }
        .close-nav { position: absolute; top: 15px; left: 20px; font-size: 30px; color: var(--primary); cursor: pointer; }
        
        .nav-item { background: #1a1a1a; margin: 10px 15px; border-radius: 8px; border: 1px solid #333; transition: var(--transition); overflow: hidden; }
        .nav-link { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: #fff; text-decoration: none; }
        .nav-item:hover { border-color: var(--primary); background: #222; }
        .nav-link i { color: var(--primary); }
        
        .sub-menu { display: none; background: #050505; padding: 5px 0; }
        .sub-menu a { padding: 10px 40px; display: block; color: #aaa; text-decoration: none; font-size: 14px; border-bottom: 1px solid #111; }
        .sub-menu a:hover { color: var(--primary); }

        /* --- شبكة الأفلام --- */
        .main-content { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .section-title { font-size: 22px; margin-bottom: 20px; border-right: 4px solid var(--primary); padding-right: 15px; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        .movie-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; transition: var(--transition); border: 1px solid #222; position: relative; }
        .movie-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 5px 15px rgba(155, 81, 224, 0.3); }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; }
        .movie-card-info { padding: 10px; text-align: center; }
        .movie-card-title { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
        .watch-btn { display: block; background: var(--primary); color: #fff; padding: 8px; text-decoration: none; border-radius: 5px; font-size: 12px; font-weight: bold; }

        @media (max-width: 768px) {
            .hero-slider { height: 250px; }
            .movies-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
            <span class="logo-text">WATCHGO</span>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-magnifying-glass icon-btn" onclick="toggleSearch()"></i>
            <i class="fa-solid fa-bars icon-btn" onclick="openNav()"></i>
        </div>
    </header>

    <div id="searchBox">
        <input type="text" id="searchInput" placeholder="ابحث هنا..." onkeyup="searchApi(this.value)">
    </div>

    <div class="hero-slider">
        <div class="slider-wrapper" id="sliderWrapper"></div>
    </div>

    <div id="sideNav" class="side-nav">
        <span class="close-nav" onclick="closeNav()">&times;</span>
        <div class="nav-item"><a href="index.html" class="nav-link">الرئيسية <i class="fa-solid fa-house"></i></a></div>
        
        <div class="nav-item">
            <div class="nav-link" onclick="toggleSub('subMovies')">أفلام أجنبي <i class="fa-solid fa-chevron-down"></i></div>
            <div id="subMovies" class="sub-menu">
                <a href="#" onclick="fetchApi('movie/top_rated')">الأعلى تقييماً ⭐</a>
                <a href="#" onclick="fetchApi('discover/movie', '28')">أكشن</a>
                <a href="#" onclick="fetchApi('discover/movie', '27')">رعب</a>
            </div>
        </div>

        <div class="nav-item">
            <div class="nav-link" onclick="toggleSub('subSeries')">مسلسلات أجنبي <i class="fa-solid fa-chevron-down"></i></div>
            <div id="subSeries" class="sub-menu">
                <a href="#" onclick="fetchApi('tv/popular')">الأكثر شهرة</a>
                <a href="#" onclick="fetchApi('tv/top_rated')">الأعلى تقييماً ⭐</a>
            </div>
        </div>
    </div>

    <div class="main-content">
        <h2 class="section-title">المضاف حديثاً</h2>
        <div class="movies-grid" id="moviesGrid"></div>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';

        function openNav() { document.getElementById("sideNav").style.width = "280px"; }
        function closeNav() { document.getElementById("sideNav").style.width = "0"; }
        function toggleSearch() { 
            const s = document.getElementById("searchBox");
            s.style.display = (s.style.display === "block") ? "none" : "block"; 
        }
        function toggleSub(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === "block") ? "none" : "block";
        }

        async function fetchApi(endpoint, genre = '') {
            let url = `${BASE_URL}/${endpoint}?api_key=${API_KEY}&language=en-US`;
            if(genre) url += `&with_genres=${genre}`;
            const res = await fetch(url);
            const data = await res.json();
            renderMovies(data.results);
            if(endpoint === 'movie/popular') renderSlider(data.results.slice(0, 5));
            closeNav();
        }

        async function searchApi(query) {
            if(query.length < 2) return;
            const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${query}`);
            const data = await res.json();
            renderMovies(data.results);
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay">
                        <div class="slide-title">${m.title || m.name}</div>
                        <a href="movie.html?id=${m.id}&type=movie" class="slide-btn">شاهد الآن</a>
                    </div>
                </div>
            `).join('');

            let i = 0;
            setInterval(() => {
                i = (i + 1) % movies.length;
                wrapper.style.transform = `translateX(${i * 100}%)`;
            }, 4000);
        }

        function renderMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = movies.filter(m => m.poster_path).map(m => `
                <div class="movie-card">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="movie-card-info">
                        <div class="movie-card-title">${m.title || m.name}</div>
                        <a href="movie.html?id=${m.id}&type=${m.title ? 'movie' : 'tv'}" class="watch-btn">مشاهدة</a>
                    </div>
                </div>
            `).join('');
        }

        fetchApi('movie/popular');
    </script>
</body>
</html>
