<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - All-in-One Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #050505; 
            --card-bg: rgba(20, 20, 20, 0.9);
            --text: #ffffff;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background-image: url('https://i.ibb.co/LhqZ88Y/movie-collage-wallpaper.jpg'); 
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.88);
            z-index: -1;
        }

        /* --- الهيدر (TopCinema Style) --- */
        .header { 
            background: rgba(10, 10, 10, 0.95); padding: 10px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(15px);
        }
        
        .nav-right { display: flex; align-items: center; gap: 25px; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; font-weight: bold; }
        .logo img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }

        .main-nav { display: flex; list-style: none; gap: 15px; }
        .nav-item { position: relative; }
        .nav-link { color: #ddd; text-decoration: none; font-size: 14px; font-weight: 600; padding: 10px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { color: var(--primary); }

        .dropdown {
            display: none; position: absolute; top: 100%; right: 0; 
            background: #111; min-width: 180px; border-radius: 5px; border: 1px solid #333; z-index: 1000;
        }
        .dropdown a { color: #eee; padding: 12px; text-decoration: none; display: block; font-size: 13px; border-bottom: 1px solid #222; }
        .dropdown a:hover { background: var(--primary); }
        .nav-item:hover .dropdown { display: block; }

        /* --- السلايدر المدمج --- */
        #heroSection { width: 100%; height: 350px; position: relative; overflow: hidden; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s ease; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .slide-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, #050505 5%, transparent 100%); 
            display: flex; flex-direction: column; justify-content: flex-end; padding: 40px 60px; 
        }

        /* --- صفحة المشاهدة (مخفية افتراضياً) --- */
        #playerSection { display: none; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid var(--primary); border-radius: 10px; margin-bottom: 30px; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .cast-list { display: flex; gap: 15px; overflow-x: auto; padding: 20px 0; }
        .cast-item { min-width: 100px; text-align: center; }
        .cast-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        /* --- شبكة الأفلام --- */
        .main-content { padding: 30px 40px; }
        .grid-label { background: var(--primary); display: inline-block; padding: 5px 15px; border-radius: 4px; margin-bottom: 25px; font-weight: bold; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 20px; }
        
        .movie-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: var(--transition); cursor: pointer; }
        .movie-card:hover { transform: scale(1.05); border-color: var(--primary); box-shadow: 0 10px 20px rgba(155, 81, 224, 0.4); }
        .movie-card img { width: 100%; height: 245px; object-fit: cover; }
        .movie-info { padding: 10px; text-align: center; font-size: 13px; font-weight: bold; }

        .back-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="nav-right">
            <a href="#" class="logo" onclick="location.reload()">
                <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
                <span>WATCHGO</span>
            </a>
            <ul class="main-nav">
                <li class="nav-item"><a class="nav-link" href="#" onclick="location.reload()">الرئيسية</a></li>
                <li class="nav-item">
                    <span class="nav-link">الأفلام <i class="fa-solid fa-chevron-down"></i></span>
                    <div class="dropdown">
                        <a href="#" onclick="fetchApi('movie/top_rated')">الأعلى تقييماً IMDB</a>
                        <a href="#" onclick="fetchApi('discover/movie', '28')">أكشن</a>
                        <a href="#" onclick="fetchApi('discover/movie', '27')">رعب</a>
                    </div>
                </li>
                <li class="nav-item"><a class="nav-link" href="#">القسم الآسيوي</a></li>
            </ul>
        </div>
        <div class="header-icons"><i class="fa-solid fa-magnifying-glass"></i></div>
    </header>

    <div id="homePage">
        <div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div>
        <div class="main-content">
            <div class="grid-label">المضاف حديثاً</div>
            <div class="movies-grid" id="moviesGrid"></div>
        </div>
    </div>

    <div id="playerSection">
        <button class="back-btn" onclick="closePlayer()"><i class="fa-solid fa-arrow-right"></i> عودة للرئيسية</button>
        <div class="video-box" id="videoBox"></div>
        <h1 id="pTitle"></h1>
        <p id="pDesc" style="margin: 20px 0; color: #ccc; line-height: 1.6;"></p>
        <h3>طاقم التمثيل</h3>
        <div class="cast-list" id="castList"></div>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';

        async function fetchApi(endpoint, genre = '') {
            let url = `${BASE_URL}/${endpoint}?api_key=${API_KEY}&language=ar`;
            if(genre) url += `&with_genres=${genre}`;
            const res = await fetch(url);
            const data = await res.json();
            renderMovies(data.results);
            if(endpoint === 'movie/popular') renderSlider(data.results.slice(0, 5));
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay"><h2>${m.title}</h2></div>
                </div>
            `).join('');
            let i = 0;
            setInterval(() => { i = (i + 1) % 5; wrapper.style.transform = `translateX(${i * 100}%)`; }, 5000);
        }

        function renderMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = movies.filter(m => m.poster_path).map(m => `
                <div class="movie-card" onclick="openPlayer(${m.id}, '${m.title ? 'movie' : 'tv'}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="movie-info">${m.title || m.name}</div>
                </div>
            `).join('');
        }

        async function openPlayer(id, type) {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('playerSection').style.display = 'block';
            window.scrollTo(0,0);

            // جلب تفاصيل الفيلم
            const res = await fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=ar`);
            const m = await res.json();
            document.getElementById('pTitle').innerText = m.title || m.name;
            document.getElementById('pDesc').innerText = m.overview;
            document.getElementById('videoBox').innerHTML = `<iframe src="https://vidsrc.me/embed/${type}?tmdb=${id}" allowfullscreen></iframe>`;

            // جلب الممثلين (طاقم التمثيل)
            const cRes = await fetch(`${BASE_URL}/${type}/${id}/credits?api_key=${API_KEY}`);
            const cData = await cRes.json();
            document.getElementById('castList').innerHTML = cData.cast.slice(0, 12).map(c => `
                <div class="cast-item">
                    <img src="${c.profile_path ? 'https://image.tmdb.org/t/p/w200'+c.profile_path : 'https://via.placeholder.com/70'}">
                    <div style="font-size:11px; margin-top:5px;">${c.name}</div>
                </div>
            `).join('');
        }

        function closePlayer() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('playerSection').style.display = 'none';
            document.getElementById('videoBox').innerHTML = '';
        }

        fetchApi('movie/popular');
    </script>
</body>
</html>
