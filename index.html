<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - الإصدار الأنيق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #050505; 
            --card-bg: rgba(20, 20, 20, 0.7);
            --text: #ffffff;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: var(--bg-dark);
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* تأثير الـ Blur والـ Glow في الخلفية */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background: radial-gradient(circle at center, rgba(155, 81, 224, 0.15) 0%, transparent 70%);
            filter: blur(100px); /* تأثير بلور ناعم */
            z-index: -1;
        }

        /* --- الهيدر (عربي) --- */
        .header { 
            background: rgba(10, 10, 10, 0.9); 
            padding: 8px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1.5px solid var(--primary); 
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(20px);
        }
        
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .logo img { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid var(--primary); }
        .logo span { font-size: 18px; font-weight: bold; }

        .main-nav { display: flex; list-style: none; gap: 10px; }
        .nav-link { color: #ccc; text-decoration: none; font-size: 13.5px; font-weight: 600; padding: 8px 12px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { color: var(--primary); }

        /* القائمة المنسدلة */
        .nav-item { position: relative; }
        .dropdown {
            display: none; position: absolute; top: 100%; right: 0; 
            background: #111; min-width: 160px; border-radius: 5px; border: 1px solid #333;
        }
        .nav-item:hover .dropdown { display: block; }
        .dropdown a { color: #eee; padding: 10px; text-decoration: none; display: block; font-size: 12px; border-bottom: 1px solid #222; }

        /* --- السلايدر المصغر جداً والمدمج --- */
        #heroSection { 
            width: 100%; 
            height: 280px; /* تصغير الحجم كما طلبت */
            position: relative; overflow: hidden; 
        }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s ease; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .slide-overlay { 
            position: absolute; inset: 0; 
            /* دمج السلايدر بتدرج يختفي في الصفحة */
            background: linear-gradient(to top, var(--bg-dark) 0%, transparent 70%); 
            display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 50px; 
        }
        .slide-title { font-size: 22px; font-weight: bold; color: #fff; text-shadow: 0 2px 10px #000; }

        /* --- شبكة الأفلام --- */
        .main-content { padding: 30px 40px; position: relative; z-index: 5; }
        .grid-label { border-right: 3px solid var(--primary); padding-right: 12px; margin-bottom: 25px; font-weight: bold; font-size: 16px; color: var(--primary); }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        .movie-card { 
            background: var(--card-bg); border-radius: 10px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); transition: var(--transition); cursor: pointer; position: relative;
            backdrop-filter: blur(5px);
        }
        .movie-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 0 20px rgba(155, 81, 224, 0.2); }
        .movie-card img { width: 100%; height: 235px; object-fit: cover; }
        .movie-badge { position: absolute; top: 8px; left: 8px; background: var(--primary); padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: bold; }
        
        .movie-info { padding: 12px; text-align: center; }
        .movie-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .watch-btn { color: #888; font-size: 10px; margin-top: 4px; display: block; letter-spacing: 0.5px; }

        .search-container { display: none; padding: 15px; background: #0a0a0a; text-align: center; }
        .search-container input { width: 60%; padding: 10px 20px; border-radius: 30px; border: 1px solid var(--primary); background: #111; color: #fff; outline: none; }

        @media (max-width: 600px) {
            .header { padding: 10px; }
            .movies-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="nav-right">
            <a href="index.html" class="logo">
                <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
                <span>WATCHGO</span>
            </a>
            <ul class="main-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
                <li class="nav-item">
                    <span class="nav-link">أفلام <i class="fa-solid fa-chevron-down"></i></span>
                    <div class="dropdown">
                        <a href="#" onclick="fetchApi('movie/top_rated')">الأعلى تقييماً</a>
                        <a href="#" onclick="fetchApi('discover/movie', '28')">أفلام أكشن</a>
                        <a href="#" onclick="fetchApi('discover/movie', '27')">أفلام رعب</a>
                    </div>
                </li>
                <li class="nav-item"><a class="nav-link">مسلسلات</a></li>
                <li class="nav-item"><a class="nav-link">القسم الآسيوي</a></li>
            </ul>
        </div>
        <div class="header-icons"><i class="fa-solid fa-magnifying-glass" style="cursor:pointer" onclick="toggleSearch()"></i></div>
    </header>

    <div id="searchBox" class="search-container"><input type="text" placeholder="ابحث عن فيلمك المفضل..." onkeyup="searchApi(this.value)"></div>

    <div id="heroSection">
        <div class="slider-wrapper" id="sliderWrapper"></div>
    </div>

    <div class="main-content">
        <div class="grid-label">المضاف حديثاً</div>
        <div class="movies-grid" id="moviesGrid"></div>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';

        function toggleSearch() {
            const s = document.getElementById('searchBox');
            s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        }

        async function fetchApi(endpoint, genre = '') {
            let url = `${BASE_URL}/${endpoint}?api_key=${API_KEY}&language=en-US`;
            if(genre) url += `&with_genres=${genre}`;
            const res = await fetch(url);
            const data = await res.json();
            renderMovies(data.results);
            if(endpoint === 'movie/popular') renderSlider(data.results.slice(0, 5));
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay"><h2 class="slide-title">${m.title}</h2></div>
                </div>
            `).join('');
            let i = 0;
            setInterval(() => { i = (i + 1) % 5; wrapper.style.transform = `translateX(${i * 100}%)`; }, 5000);
        }

        function renderMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = movies.filter(m => m.poster_path).map(m => `
                <div class="movie-card" onclick="goToMovie(${m.id}, '${m.title ? 'movie' : 'tv'}')">
                    <div class="movie-badge">4K</div>
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="movie-info">
                        <div class="movie-name">${m.title || m.name}</div>
                        <span class="watch-btn">WATCH NOW</span>
                    </div>
                </div>
            `).join('');
        }

        function goToMovie(id, type) {
            window.location.href = `movie.html?id=${id}&type=${type}`;
        }

        async function searchApi(query) {
            if(query.length < 2) return;
            const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${query}&language=en-US`);
            const data = await res.json();
            renderMovies(data.results);
        }

        fetchApi('movie/popular');
    </script>
</body>
</html>
