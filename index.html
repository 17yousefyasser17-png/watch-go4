<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Full Display Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #050505; 
            --card-bg: rgba(20, 20, 20, 0.95);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* تأثير التوهج الخلفي */
        body::before {
            content: ""; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(155, 81, 224, 0.08) 0%, transparent 85%);
            filter: blur(100px); z-index: -1;
        }

        /* --- الهيدر --- */
        .header { 
            background: rgba(10, 10, 10, 0.98); padding: 12px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(20px);
        }
        .logo-ctn { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
        .logo-ctn img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary); }

        .main-nav { display: flex; list-style: none; gap: 10px; }
        .nav-link { color: #ddd; text-decoration: none; font-size: 14px; font-weight: 600; padding: 10px 15px; cursor: pointer; }
        
        /* --- السلايدر العلوي --- */
        #heroSection { width: 100%; height: 350px; position: relative; overflow: hidden; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s ease; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center top; position: relative; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-dark) 15%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px 60px; }

        /* --- المحتوى الرئيسي (3 أعمدة) --- */
        .container { padding: 30px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; }

        /* --- الأقسام (كل شيء ظاهر) --- */
        .section-box { margin-bottom: 50px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid rgba(155, 81, 224, 0.1); }
        .section-title { color: var(--primary); font-size: 18px; font-weight: bold; margin-bottom: 25px; border-right: 4px solid var(--primary); padding-right: 12px; display: flex; align-items: center; gap: 10px; }

        /* شبكة عرض المحتوى */
        .grid-display { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px; 
        }

        .item-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: var(--transition); cursor: pointer; position: relative; }
        .item-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 25px rgba(155, 81, 224, 0.3); }
        .item-card img { width: 100%; height: 230px; object-fit: cover; }
        .item-info { padding: 12px; text-align: center; }
        .item-name { font-size: 12px; font-weight: bold; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .watch-btn { background: var(--primary); color: #fff; font-size: 11px; padding: 8px; border-radius: 6px; display: block; font-weight: bold; text-decoration: none; }

        /* البارات الجانبية */
        .sidebar { background: rgba(10, 10, 10, 0.7); padding: 15px; border-radius: 12px; border: 1px solid rgba(155, 81, 224, 0.1); height: fit-content; position: sticky; top: 90px; }
        .side-title { color: var(--primary); font-size: 15px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 8px; text-align: center; }
        .side-item { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; font-size: 11px; }
        .side-item:hover { color: var(--primary); transform: translateX(-5px); }
        .side-item img { width: 45px; height: 65px; border-radius: 5px; object-fit: cover; border: 1px solid #333; }

        #searchBox { display: none; padding: 20px; background: #000; text-align: center; }
        #searchBox input { width: 70%; padding: 12px; border-radius: 25px; border: 1px solid var(--primary); background: #111; color: #fff; outline: none; }

        @media (max-width: 1200px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-ctn">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
            <span style="font-weight: bold; font-size: 22px;">WATCHGO</span>
        </a>
        <nav class="main-nav">
            <a class="nav-link" href="index.html">الرئيسية</a>
            <a class="nav-link" href="#">أفلام</a>
            <a class="nav-link" href="#">مسلسلات</a>
        </nav>
        <div class="header-icons"><i class="fa-solid fa-magnifying-glass" onclick="toggleSearch()" style="cursor:pointer; font-size: 20px;"></i></div>
    </header>

    <div id="searchBox"><input type="text" placeholder="ابحث عن فيلم أو مسلسل..." onkeyup="searchApi(this.value)"></div>
    <div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div>

    <div class="container">
        <aside class="sidebar">
            <div class="side-title">أفضل أفلام الشهر</div>
            <div id="bestMoviesSide"></div>
        </aside>

        <main class="main-col">
            <section class="section-box">
                <div class="section-title"><i class="fa-solid fa-fire"></i> أحدث الحلقات المضافة</div>
                <div class="grid-display" id="episodesGrid"></div>
            </section>

            <section class="section-box">
                <div class="section-title"><i class="fa-solid fa-n"></i> أفلام نتفليكس</div>
                <div class="grid-display" id="netflixGrid"></div>
            </section>

            <section class="section-box">
                <div class="section-title"><i class="fa-solid fa-globe"></i> أفلام أجنبية مضافة حديثاً</div>
                <div class="grid-display" id="moviesGrid"></div>
            </section>
        </main>

        <aside class="sidebar">
            <div class="side-title">أحدث الأنميات</div>
            <div id="animeSide"></div>
        </aside>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';

        function toggleSearch() { 
            const s = document.getElementById("searchBox");
            s.style.display = (s.style.display === "block") ? "none" : "block"; 
        }

        function createCard(m, type) {
            return `
                <div class="item-card" onclick="location.href='movie.html?id=${m.id}&type=${type}'">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="item-info">
                        <div class="item-name">${m.title || m.name}</div>
                        <div class="watch-btn">شاهد الآن</div>
                    </div>
                </div>`;
        }

        async function init() {
            // السلايدر
            const pop = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}`);
            const popData = await pop.json();
            renderSlider(popData.results.slice(0, 5));

            // ملء الشبكات (Grids) بدلاً من الكاروسيل
            document.getElementById('moviesGrid').innerHTML = popData.results.slice(0, 12).map(m => createCard(m, 'movie')).join('');

            const ep = await fetch(`${BASE_URL}/tv/on_the_air?api_key=${API_KEY}`);
            const epData = await ep.json();
            document.getElementById('episodesGrid').innerHTML = epData.results.slice(0, 12).map(m => createCard(m, 'tv')).join('');

            const net = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_networks=213`);
            const netData = await net.json();
            document.getElementById('netflixGrid').innerHTML = netData.results.slice(0, 12).map(m => createCard(m, 'movie')).join('');

            // البارات الجانبية
            const bestM = await fetch(`${BASE_URL}/movie/top_rated?api_key=${API_KEY}`);
            const bestMData = await bestM.json();
            document.getElementById('bestMoviesSide').innerHTML = bestMData.results.slice(0, 8).map(m => `
                <div class="side-item" onclick="location.href='movie.html?id=${m.id}&type=movie'">
                    <img src="https://image.tmdb.org/t/p/w200${m.poster_path}">
                    <div>${m.title}</div>
                </div>`).join('');

            const ani = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=16`);
            const aniData = await ani.json();
            document.getElementById('animeSide').innerHTML = aniData.results.slice(0, 8).map(m => `
                <div class="side-item" onclick="location.href='movie.html?id=${m.id}&type=movie'">
                    <img src="https://image.tmdb.org/t/p/w200${m.poster_path}">
                    <div>${m.title}</div>
                </div>`).join('');
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay"><h2>${m.title}</h2></div>
                </div>`).join('');
            let i = 0; setInterval(() => { i = (i + 1) % 5; wrapper.style.transform = `translateX(${i * 100}%)`; }, 5000);
        }

        init();
    </script>
</body>
</html>
