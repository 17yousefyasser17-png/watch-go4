<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - High Performance UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #070707; 
            --card-bg: #111;
            --border-color: #222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* الهيدر */
        .header { 
            background: #000; padding: 0 40px; height: 75px;
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 2000;
        }
        .logo-ctn { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; flex-shrink: 0; }
        .logo-ctn img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }

        .main-nav { display: flex; list-style: none; height: 100%; align-items: center; gap: 5px; }
        .nav-link { 
            color: #eee; text-decoration: none; font-size: 14px; font-weight: 600; 
            padding: 0 15px; cursor: pointer; display: flex; align-items: center; gap: 6px;
            height: 100%; transition: 0.3s;
        }
        .nav-link:hover { color: var(--primary); background: rgba(155, 81, 224, 0.05); }

        /* شريط البحث */
        #searchBox { 
            background: rgba(0,0,0,0.95); padding: 20px; display: none; 
            position: fixed; top: 75px; left: 0; width: 100%; z-index: 1500;
            border-bottom: 1px solid var(--primary); backdrop-filter: blur(10px);
        }
        #searchBox input { 
            width: 80%; max-width: 800px; padding: 15px 25px; background: #111; 
            border: 2px solid var(--border-color); color: #fff; border-radius: 50px; 
            outline: none; font-size: 18px; transition: 0.3s;
        }

        /* السلايدر */
        .slider-container { max-width: 1620px; margin: 20px auto; padding: 0 40px; }
        #heroSection { width: 100%; height: 420px; position: relative; overflow: hidden; border-radius: 15px; border: 1px solid var(--border-color); background: #000; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center 20%; position: relative; }
        .slide-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(7,7,7,1) 5%, transparent 70%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; }

        /* الحاويات والشبكة */
        .container { padding: 20px 40px; display: grid; grid-template-columns: 280px 1fr 280px; gap: 25px; max-width: 1700px; margin: 0 auto; }
        .section-box { margin-bottom: 50px; transition: opacity 0.3s ease; }
        .section-title { background: #111; padding: 12px 20px; font-size: 17px; font-weight: bold; margin-bottom: 20px; border-right: 5px solid var(--primary); display: flex; align-items: center; gap: 10px; }
        
        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .item-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); transition: 0.4s ease; cursor: pointer; position: relative; }
        .item-card:hover { transform: scale(1.05); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .item-card img { width: 100%; height: 260px; object-fit: cover; }
        
        .card-meta { padding: 10px; background: rgba(0,0,0,0.8); text-align: center; }
        .card-meta h3 { font-size: 13px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta span { font-size: 11px; color: var(--primary); font-weight: bold; }

        /* الترقيم */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 25px; }
        .page-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 15px; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .page-btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }

        /* السايد بار */
        .sidebar { background: #111; border: 1px solid var(--border-color); border-radius: 8px; height: fit-content; position: sticky; top: 90px; padding: 15px; }
        .side-title { color: var(--primary); font-weight: bold; margin-bottom: 15px; font-size: 14px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .side-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .side-item:hover { color: var(--primary); }
        .side-item img { width: 45px; height: 60px; border-radius: 4px; object-fit: cover; }
        .side-item span { font-size: 12px; font-weight: 500; }

        .hidden { display: none !important; }
        @media (max-width: 1200px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } .main-nav { display: none; } }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-ctn">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
            <span style="font-weight: bold; font-size: 22px;">WATCH<span style="color: var(--primary);">GO</span></span>
        </a>
        <nav class="main-nav">
            <div class="nav-link" onclick="location.reload()">الرئيسية</div>
            <div class="nav-link" onclick="showFull('movie', 'أفلام مصرية', 'egypt')">أفلام مصرية</div>
            <div class="nav-link" onclick="showFull('tv', 'مسلسلات رمضان', 'ramadan')">رمضان 2026</div>
            <div class="nav-link" onclick="showFull('movie', 'عالم الأنمي', '16')">أنمي</div>
        </nav>
        <div class="header-icons">
            <i class="fa-solid fa-magnifying-glass" style="cursor:pointer; font-size: 20px;" onclick="toggleSearch()"></i>
        </div>
    </header>

    <div id="searchBox">
        <center><input type="text" id="searchInput" placeholder="ابحث عن الأفلام أو المسلسلات..." onkeyup="smartSearch(this.value)"></center>
    </div>
    
    <div class="slider-container" id="sliderArea">
        <div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div>
    </div>

    <div class="container">
        <aside class="sidebar">
            <div class="side-title">الأعلى تقييماً</div>
            <div id="topRatedSide"></div>
        </aside>

        <main id="mainDisplay">
            <section class="section-box" id="sec-egypt">
                <div class="section-title">أحدث الأفلام المصرية</div>
                <div class="grid-display" id="grid-egypt"></div>
                <div class="pagination" id="pag-egypt"></div>
            </section>

            <section class="section-box" id="sec-arabic">
                <div class="section-title">أفلام عربية</div>
                <div class="grid-display" id="grid-arabic"></div>
                <div class="pagination" id="pag-arabic"></div>
            </section>

            <section class="section-box" id="sec-global">
                <div class="section-title">أفلام عالمية</div>
                <div class="grid-display" id="grid-global"></div>
                <div class="pagination" id="pag-global"></div>
            </section>
        </main>

        <aside class="sidebar">
            <div class="side-title">أفلام الأنمي</div>
            <div id="animeSide"></div>
        </aside>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';
        
        // الكاش لحفظ البيانات المجلوبة مسبقاً
        const localCache = {};

        function toggleSearch() {
            const s = document.getElementById("searchBox");
            s.style.display = s.style.display === "block" ? "none" : "block";
            if(s.style.display === "block") document.getElementById("searchInput").focus();
        }

        // إنشاء الكروت بسرعة فائقة
        function renderCard(m, type) {
            const title = m.title || m.name;
            const year = (m.release_date || m.first_air_date || '2026').split('-')[0];
            const poster = m.poster_path ? `https://image.tmdb.org/t/p/w300${m.poster_path}` : 'https://via.placeholder.com/300x450?text=No+Image';
            
            return `
                <div class="item-card" onclick="location.href='movie.html?id=${m.id}&type=${type}'">
                    <img src="${poster}" loading="lazy" alt="${title}">
                    <div class="card-meta">
                        <h3>${title}</h3>
                        <span>${year} • ⭐ ${m.vote_average.toFixed(1)}</span>
                    </div>
                </div>`;
        }

        async function fetchWithCache(url) {
            if (localCache[url]) return localCache[url];
            const res = await fetch(url);
            const data = await res.json();
            localCache[url] = data;
            return data;
        }

        async function loadSection(gridId, pagId, type, cat = '', page = 1) {
            const grid = document.getElementById(gridId);
            grid.parentElement.style.opacity = '0.4'; // إشارة بصرية للتحميل

            let url = `${BASE_URL}/discover/${type}?api_key=${API_KEY}&page=${page}&sort_by=popularity.desc&language=ar-SA`;
            
            if (cat === 'egypt') url += `&with_origin_country=EG&with_original_language=ar`;
            else if (cat === 'arabic') url += `&with_original_language=ar&without_origin_country=EG`;
            else if (cat === 'ramadan') url += `&with_original_language=ar&first_air_date_year=2026`;
            else if (!isNaN(cat)) url += `&with_genres=${cat}`;

            const data = await fetchWithCache(url);
            
            grid.innerHTML = data.results.slice(0, 12).map(m => renderCard(m, type)).join('');
            grid.parentElement.style.opacity = '1';

            // بناء الترقيم
            let pagHTML = '';
            const total = Math.min(data.total_pages, 8);
            for(let i=1; i<=total; i++) {
                pagHTML += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadSection('${gridId}','${pagId}','${type}','${cat}',${i})">${i}</button>`;
            }
            document.getElementById(pagId).innerHTML = pagHTML;
            if(page > 1) grid.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        async function init() {
            // تحميل الأقسام
            loadSection('grid-egypt', 'pag-egypt', 'movie', 'egypt');
            loadSection('grid-arabic', 'pag-arabic', 'movie', 'arabic');
            loadSection('grid-global', 'pag-global', 'movie');

            // السلايدر
            const trends = await fetchWithCache(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}&language=ar-SA`);
            const slider = document.getElementById('sliderWrapper');
            slider.innerHTML = trends.results.slice(0, 5).map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay">
                        <h2 style="font-size:30px; margin-bottom:10px;">${m.title}</h2>
                        <button class="page-btn active" onclick="location.href='movie.html?id=${m.id}&type=movie'">شاهد الآن</button>
                    </div>
                </div>`).join('');

            let currentSlide = 0;
            setInterval(() => {
                currentSlide = (currentSlide + 1) % 5;
                slider.style.transform = `translateX(${currentSlide * 100}%)`;
            }, 6000);

            // القوائم الجانبية
            const topRated = await fetchWithCache(`${BASE_URL}/movie/top_rated?api_key=${API_KEY}&language=ar-SA`);
            document.getElementById('topRatedSide').innerHTML = topRated.results.slice(0, 7).map(m => `
                <div class="side-item" onclick="location.href='movie.html?id=${m.id}&type=movie'">
                    <img src="https://image.tmdb.org/t/p/w200${m.poster_path}">
                    <span>${m.title}</span>
                </div>`).join('');

            const anime = await fetchWithCache(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=16&language=ar-SA`);
            document.getElementById('animeSide').innerHTML = anime.results.slice(0, 7).map(m => `
                <div class="side-item" onclick="location.href='movie.html?id=${m.id}&type=movie'">
                    <img src="https://image.tmdb.org/t/p/w200${m.poster_path}">
                    <span>${m.title}</span>
                </div>`).join('');
        }

        async function showFull(type, title, cat) {
            document.getElementById('sliderArea').classList.add('hidden');
            const main = document.getElementById('mainDisplay');
            main.innerHTML = `
                <section class="section-box">
                    <div class="section-title">${title}</div>
                    <div class="grid-display" id="fullGrid"></div>
                    <div class="pagination" id="fullPag"></div>
                </section>`;
            loadSection('fullGrid', 'fullPag', type, cat);
        }

        let searchTimer;
        function smartSearch(query) {
            clearTimeout(searchTimer);
            if (query.length < 2) return;
            searchTimer = setTimeout(async () => {
                document.getElementById('sliderArea').classList.add('hidden');
                const main = document.getElementById('mainDisplay');
                main.innerHTML = `<div class="section-title">نتائج البحث عن: ${query}</div><div class="grid-display" id="sGrid"></div>`;
                
                const data = await fetchWithCache(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${query}&language=ar-SA`);
                document.getElementById('sGrid').innerHTML = data.results
                    .filter(i => i.poster_path)
                    .map(m => renderCard(m, m.media_type || 'movie')).join('');
            }, 500);
        }

        init();
    </script>
</body>
</html>
