<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - الإصدار الاحترافي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #050505; 
            --card-bg: rgba(20, 20, 20, 0.95);
            --text: #ffffff;
            --glass: rgba(155, 81, 224, 0.05);
            --transition: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* تأثير Glow البنفسجي */
        body::before {
            content: ""; position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background: radial-gradient(circle at center, rgba(155, 81, 224, 0.1) 0%, transparent 70%);
            filter: blur(100px); z-index: -1;
        }

        /* --- الهيدر والقوائم --- */
        .header { 
            background: rgba(10, 10, 10, 0.95); padding: 10px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(15px);
        }
        .logo-ctn { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-ctn img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--primary); box-shadow: 0 0 10px var(--primary); }
        .logo-text { font-size: 20px; font-weight: bold; color: #fff; }

        .main-nav { display: flex; list-style: none; gap: 5px; }
        .nav-item { position: relative; }
        .nav-link { 
            color: #ddd; text-decoration: none; font-size: 14px; font-weight: 600; 
            padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 6px;
        }
        .dropdown {
            position: absolute; top: 100%; right: 0; background: #111; min-width: 220px; 
            border-radius: 0 0 8px 8px; border: 1px solid #333; border-top: 2px solid var(--primary);
            display: none; opacity: 0; transform: translateY(10px); transition: 0.3s; z-index: 1100;
        }
        .nav-item:hover .dropdown { display: block; opacity: 1; transform: translateY(0); }
        .dropdown a { 
            color: #eee; padding: 12px 20px; text-decoration: none; display: block; 
            font-size: 13px; border-bottom: 1px solid #222; text-align: right; 
        }
        .dropdown a:hover { background: #1a1a1a; color: var(--primary); padding-right: 25px; }

        /* --- السلايدر --- */
        #heroSection { width: 100%; height: 280px; position: relative; overflow: hidden; }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s ease; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .slide-overlay { 
            position: absolute; inset: 0; background: linear-gradient(to top, var(--bg-dark) 0%, transparent 80%); 
            display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 60px; 
        }

        /* --- المحتوى --- */
        .main-content { padding: 30px 40px; display: grid; grid-template-columns: 1fr 300px; gap: 30px; }
        .section-box { background: var(--glass); padding: 20px; border-radius: 12px; border: 1px solid rgba(155, 81, 224, 0.1); margin-bottom: 30px; }
        .section-title { 
            color: var(--primary); font-size: 17px; font-weight: bold; margin-bottom: 20px; 
            display: flex; align-items: center; gap: 10px; border-right: 3px solid var(--primary); padding-right: 12px;
        }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 20px; }
        .item-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; cursor: pointer; position: relative; }
        .item-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .item-card img { width: 100%; height: 230px; object-fit: cover; }
        .quality-badge { position: absolute; top: 8px; left: 8px; background: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; }
        .item-info { padding: 10px; text-align: center; }
        .item-name { font-size: 12px; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .sidebar { background: rgba(10, 10, 10, 0.8); padding: 20px; border-radius: 12px; border: 1px solid rgba(155, 81, 224, 0.1); height: fit-content; }
        #searchBox { display: none; padding: 15px; background: #0a0a0a; text-align: center; }
        #searchBox input { width: 80%; padding: 10px 20px; border-radius: 30px; border: 1px solid var(--primary); background: #111; color: #fff; outline: none; }

        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-ctn">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
            <span class="logo-text">WATCHGO</span>
        </a>

        <ul class="main-nav">
            <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
            
            <li class="nav-item">
                <span class="nav-link">الأفلام <i class="fa-solid fa-chevron-down"></i></span>
                <div class="dropdown">
                    <a href="#" onclick="filterContent('movie', '', 'أفلام أجنبي')"><i class="fa-solid fa-film"></i> أفلام أجنبي</a>
                    <a href="#" onclick="filterContent('movie', '16', 'أفلام أنمي')"><i class="fa-solid fa-ghost"></i> أفلام أنمي</a>
                    <a href="#" onclick="filterContent('movie', '10749', 'أفلام آسيوية')"><i class="fa-solid fa-earth-asia"></i> أفلام آسيوية</a>
                    <a href="#" onclick="filterContent('movie', '28', 'أفلام نتفليكس (أكشن)')"><i class="fa-solid fa-tv"></i> أفلام نتفليكس</a>
                    <a href="#" onclick="filterContent('movie', 'top_rated', 'الأعلى تقييماً IMDB')"><i class="fa-solid fa-star"></i> الأعلى تقييماً IMDB</a>
                </div>
            </li>

            <li class="nav-item">
                <span class="nav-link">المسلسلات <i class="fa-solid fa-chevron-down"></i></span>
                <div class="dropdown">
                    <a href="#" onclick="filterContent('tv', '', 'مسلسلات أجنبي')"><i class="fa-solid fa-clapperboard"></i> مسلسلات أجنبي</a>
                    <a href="#" onclick="filterContent('tv', '10759', 'مسلسلات نتفليكس')"><i class="fa-solid fa-video"></i> مسلسلات نتفليكس</a>
                </div>
            </li>
        </ul>

        <div class="header-icons"><i class="fa-solid fa-magnifying-glass" style="cursor:pointer" onclick="toggleSearch()"></i></div>
    </header>

    <div id="searchBox"><input type="text" placeholder="ابحث عن فيلم أو مسلسل..." onkeyup="searchApi(this.value)"></div>
    <div id="heroSection"><div class="slider-wrapper" id="sliderWrapper"></div></div>

    <div class="main-content">
        <div class="left-col">
            <div class="section-box">
                <div class="section-title" id="mainTitle"><i class="fa-solid fa-bolt"></i> آخر المضاف</div>
                <div class="movies-grid" id="moviesGrid"></div>
            </div>
        </div>

        <aside class="sidebar">
            <div style="color:var(--primary); font-weight:bold; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">أحدث الأنميات</div>
            <div id="animeSidebar"></div>
        </aside>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';

        function toggleSearch() { 
            const s = document.getElementById("searchBox");
            s.style.display = (s.style.display === "block") ? "none" : "block"; 
        }

        // الوظيفة الذكية للتحويل بين الأقسام
        async function filterContent(type, genreId, title) {
            document.getElementById('mainTitle').innerHTML = `<i class="fa-solid fa-filter"></i> عرض ${title}`;
            let url = `${BASE_URL}/discover/${type}?api_key=${API_KEY}&language=en-US`;
            
            if(genreId === 'top_rated') url = `${BASE_URL}/movie/top_rated?api_key=${API_KEY}&language=en-US`;
            else if(genreId) url += `&with_genres=${genreId}`;

            const res = await fetch(url);
            const data = await res.json();
            renderGrid('moviesGrid', data.results);
            window.scrollTo({ top: 300, behavior: 'smooth' }); // ينزل بيك للمحتوى الجديد
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay"><h2 style="font-size:24px; font-weight:bold;">${m.title || m.name}</h2></div>
                </div>
            `).join('');
            let i = 0; setInterval(() => { i = (i + 1) % 5; wrapper.style.transform = `translateX(${i * 100}%)`; }, 5000);
        }

        function renderGrid(gridId, results) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = results.slice(0, 18).map(item => `
                <div class="item-card" onclick="location.href='movie.html?id=${item.id}&type=${item.title ? 'movie' : 'tv'}'">
                    <div class="quality-badge">WEB-DL</div>
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
                    <div class="item-info"><div class="item-name">${item.title || item.name}</div></div>
                </div>
            `).join('');
        }

        async function init() {
            const res = await fetch(`${BASE_URL}/movie/popular?api_key=${API_KEY}&language=en-US`);
            const data = await res.json();
            renderSlider(data.results.slice(0, 5));
            renderGrid('moviesGrid', data.results);
            fetchAnimeSidebar();
        }

        async function fetchAnimeSidebar() {
            const res = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=16&language=en-US`);
            const data = await res.json();
            document.getElementById('animeSidebar').innerHTML = data.results.slice(0, 8).map(a => `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px; cursor:pointer;" onclick="location.href='movie.html?id=${a.id}&type=movie'">
                    <img src="https://image.tmdb.org/t/p/w200${a.poster_path}" style="width:45px; height:45px; border-radius:5px; object-fit:cover;">
                    <div style="font-size:11px; color:#ccc;">${a.title}</div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
