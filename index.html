<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Purple Cinematic Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg-dark: #050505; 
            --card-bg: rgba(20, 20, 20, 0.95);
            --text: #ffffff;
            --glass: rgba(155, 81, 224, 0.05);
            --transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg-dark); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* تأثير الـ Blur والـ Glow البنفسجي في الخلفية */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background: radial-gradient(circle at center, rgba(155, 81, 224, 0.1) 0%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
        }

        /* --- الهيدر (ستايل توب سينما بالبنفسجي) --- */
        .header { 
            background: rgba(10, 10, 10, 0.92); 
            padding: 10px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); 
            position: sticky; top: 0; z-index: 1000; 
            backdrop-filter: blur(15px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .logo-ctn { display: flex; align-items: center; gap: 12px; }
        .logo-ctn img { 
            width: 40px; height: 40px; border-radius: 50%; 
            border: 2px solid var(--primary); object-fit: cover;
            box-shadow: 0 0 15px var(--primary);
        }
        .logo-text { font-size: 20px; font-weight: bold; color: #fff; letter-spacing: 1px; }

        .main-nav { display: flex; list-style: none; gap: 18px; }
        .nav-link { 
            color: #ccc; text-decoration: none; font-size: 14px; 
            font-weight: 600; padding: 10px; cursor: pointer; transition: 0.3s; 
        }
        .nav-link:hover { color: var(--primary); transform: scale(1.05); }

        .header-icons { display: flex; align-items: center; gap: 20px; }
        .icon-btn { font-size: 20px; cursor: pointer; color: #fff; transition: 0.3s; }
        .icon-btn:hover { color: var(--primary); transform: scale(1.2); }

        /* صندوق البحث */
        #searchBox { display: none; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        #searchBox input { 
            width: 100%; max-width: 600px; margin: 0 auto; display: block;
            padding: 12px 20px; border-radius: 30px; border: 2px solid var(--primary); 
            background: #111; color: #fff; outline: none; text-align: center;
            font-size: 15px; box-shadow: 0 0 20px rgba(155, 81, 224, 0.2);
        }

        /* --- السلايدر المصغر (شريط سينمائي علوي) --- */
        #heroSection { 
            width: 100%; 
            height: 280px; 
            position: relative; overflow: hidden; 
            border-bottom: 2px solid rgba(155, 81, 224, 0.2);
        }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s ease; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .slide-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg-dark) 0%, transparent 70%); 
            display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 60px; 
        }
        .slide-title { font-size: 26px; font-weight: bold; color: #fff; text-shadow: 0 2px 10px #000; }

        /* --- المحتوى الرئيسي (شبكة الأقسام زي الفيديو) --- */
        .main-content { padding: 30px 40px; display: grid; grid-template-columns: 1fr 300px; gap: 30px; }

        /* القسم الرئيسي (آخر الحلقات والأفلام) */
        .left-col { display: flex; flex-direction: column; gap: 30px; }
        .section-box { background: var(--glass); padding: 25px; border-radius: 15px; border: 1px solid rgba(155, 81, 224, 0.1); backdrop-filter: blur(10px); }
        .section-title { 
            color: var(--primary); font-size: 18px; font-weight: bold; margin-bottom: 20px; 
            display: flex; align-items: center; gap: 10px; border-right: 3px solid var(--primary); padding-right: 12px;
        }

        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .item-card { 
            background: var(--card-bg); border-radius: 10px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.03); transition: var(--transition); cursor: pointer; position: relative;
        }
        .item-card:hover { transform: translateY(-8px) scale(1.03); border-color: var(--primary); box-shadow: 0 10px 25px rgba(155, 81, 224, 0.3); }
        .item-card img { width: 100%; height: 235px; object-fit: cover; }
        .quality-badge { position: absolute; top: 8px; left: 8px; background: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; color: #fff; }
        
        .item-info { padding: 12px; text-align: center; }
        .item-name { font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; margin-bottom: 4px; }
        .item-episode { color: #aaa; font-size: 10px; }

        /* القائمة الجانبية (آخر الأنميات المضافة) */
        .sidebar { background: rgba(10, 10, 10, 0.8); padding: 20px; border-radius: 15px; border: 1px solid rgba(155, 81, 224, 0.1); height: fit-content; }
        .sidebar-title { color: var(--primary); font-size: 16px; margin-bottom: 15px; text-align: center; font-weight: bold; }
        .side-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); text-decoration: none; color: #ccc; transition: 0.3s; }
        .side-item:hover { color: var(--primary); transform: translateX(-5px); }
        .side-item img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; border: 1px solid #333; }
        .side-info { flex: 1; font-size: 11px; }

        @media (max-width: 1000px) { .main-content { grid-template-columns: 1fr; } .sidebar { display: none; } }
        @media (max-width: 768px) { .header { padding: 10px 20px; } .main-nav { display: none; } .movies-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-ctn">
            <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg" alt="Logo">
            <span class="logo-text">WATCHGO</span>
        </div>
        <ul class="main-nav">
            <li><a class="nav-link" href="index.html">الرئيسية</a></li>
            <li><a class="nav-link" onclick="fetchApi('movie/popular')">أفلام</a></li>
            <li><a class="nav-link" onclick="fetchApi('tv/popular')">مسلسلات</a></li>
            <li><a class="nav-link" onclick="fetchApi('discover/movie', '16')">أنمي</a></li>
            <li><a class="nav-link" href="list.html?type=favorites">المفضلة <i class="fa-solid fa-heart" style="color: var(--primary);"></i></a></li>
        </ul>
        <div class="header-icons"><i class="fa-solid fa-magnifying-glass icon-btn" onclick="toggleSearch()"></i></div>
    </header>

    <div id="searchBox"><input type="text" placeholder="Search movies, TV shows..." onkeyup="searchApi(this.value)"></div>

    <div id="heroSection">
        <div class="slider-wrapper" id="sliderWrapper"></div>
    </div>

    <div class="main-content">
        <div class="left-col">
            <div class="section-box">
                <div class="section-title"><i class="fa-solid fa-fire"></i> آخر الحلقات المضافة</div>
                <div class="movies-grid" id="episodesGrid"></div>
            </div>

            <div class="section-box">
                <div class="section-title"><i class="fa-solid fa-film"></i> آخر الأفلام المضافة</div>
                <div class="movies-grid" id="moviesGrid"></div>
            </div>
        </div>

        <aside class="sidebar">
            <div class="sidebar-title"><i class="fa-solid fa-user-ninja"></i> آخر الأنميات المضافة</div>
            <div id="animeSidebar">
                </div>
        </aside>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';

        function toggleSearch() { 
            const s = document.getElementById("searchBox");
            s.style.display = (s.style.display === "block") ? "none" : "block"; 
        }

        async function fetchApi(endpoint, genre = '') {
            let url = `${BASE_URL}/${endpoint}?api_key=${API_KEY}&language=en-US`;
            if(genre) url += `&with_genres=${genre}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                renderSlider(data.results.slice(0, 5));
                renderGrid('moviesGrid', data.results); // عرض الأفلام
                fetchEpisodes(); // عرض الحلقات
                fetchAnimeSidebar(); // عرض الأنميات
            } catch(e) { console.error(e); }
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('https://image.tmdb.org/t/p/original${m.backdrop_path}')">
                    <div class="slide-overlay"><h2 class="slide-title">${m.title || m.name}</h2></div>
                </div>
            `).join('');
            let i = 0;
            setInterval(() => { i = (i + 1) % 5; wrapper.style.transform = `translateX(${i * 100}%)`; }, 5000);
        }

        function renderGrid(gridId, results, isEpisode = false) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            results.slice(0, 12).forEach(item => {
                if(!item.poster_path) return;
                const type = item.title ? 'movie' : 'tv';
                const title = item.title || item.name;
                grid.innerHTML += `
                    <div class="item-card" onclick="location.href='movie.html?id=${item.id}&type=${type}'">
                        <div class="quality-badge">WEB-DL</div>
                        <img src="${IMG_URL + item.poster_path}" alt="${title}">
                        <div class="item-info">
                            <div class="item-name">${title}</div>
                            ${isEpisode ? '<div class="item-episode">مترجم اون لاين</div>' : ''}
                        </div>
                    </div>`;
            });
        }

        // جلب حلقات وهمية (للعرض)
        async function fetchEpisodes() {
            const res = await fetch(`${BASE_URL}/tv/popular?api_key=${API_KEY}&language=en-US`);
            const data = await res.json();
            renderGrid('episodesGrid', data.results, true);
        }

        // جلب الأنميات للقائمة الجانبية
        async function fetchAnimeSidebar() {
            const res = await fetch(`${BASE_URL}/discover/movie?api_key=${API_KEY}&with_genres=16&language=en-US`);
            const data = await res.json();
            const sidebar = document.getElementById('animeSidebar');
            sidebar.innerHTML = '';
            data.results.slice(0, 8).forEach(a => {
                sidebar.innerHTML += `
                    <a href="movie.html?id=${a.id}&type=movie" class="side-item">
                        <img src="${IMG_URL + a.poster_path}" alt="${a.title}">
                        <div class="side-info">
                            <div>${a.title}</div>
                            <div style="color:#aaa;">مترجم اون لاين</div>
                        </div>
                    </a>`;
            });
        }

        async function searchApi(query) {
            if(query.length < 2) return;
            const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${query}&language=en-US`);
            const data = await res.json();
            renderGrid('moviesGrid', data.results);
        }

        fetchApi('movie/popular');
    </script>
</body>
</html>
