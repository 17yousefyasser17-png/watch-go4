<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Purple Cinematic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { 
            --primary: #9b51e0; 
            --bg: #050505; 
            --text: #ffffff; 
            --glass: rgba(155, 81, 224, 0.05);
            --transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* تأثير البلور التفاعلي */
        .blur-container:hover .blur-item:not(:hover) { 
            filter: blur(8px) grayscale(0.5); 
            opacity: 0.4; 
            transform: scale(0.96);
        }

        .hero-section {
            position: relative; width: 100%; min-height: 100vh;
            background-size: cover; background-position: center top; background-attachment: fixed;
            padding: 40px 5%;
        }

        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.9) 80%, #050505 100%);
            z-index: 1;
        }

        .main-container { position: relative; z-index: 2; max-width: 1400px; margin: 0 auto; }

        /* التخطيط المستوحى من الصور */
        .movie-layout { display: grid; grid-template-columns: 300px 1fr 320px; gap: 40px; margin-top: 20px; }

        /* 1. عمود البوستر */
        .poster-col img { 
            width: 100%; border-radius: 12px; border: 2px solid var(--primary); 
            box-shadow: 0 0 25px rgba(155, 81, 224, 0.3); transition: var(--transition);
        }
        .poster-col img:hover { transform: scale(1.04); box-shadow: 0 0 45px var(--primary); }

        /* 2. عمود المعلومات */
        .info-col h1 { font-size: 38px; margin-bottom: 15px; font-weight: bold; }
        .info-col h1 span { color: #aaa; font-size: 20px; font-weight: normal; margin-right: 10px; }

        .section-box { background: var(--glass); padding: 25px; border-radius: 15px; margin-bottom: 25px; border-right: 4px solid var(--primary); backdrop-filter: blur(10px); }
        .box-title { color: var(--primary); font-size: 22px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; }
        
        .details-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .detail-item { display: flex; align-items: center; gap: 10px; font-size: 16px; }
        .detail-item i { color: var(--primary); font-size: 12px; }
        .detail-item b { color: #888; }

        /* 3. عمود الأكشن */
        .action-col { display: flex; flex-direction: column; gap: 15px; }
        .action-card { 
            background: rgba(255,255,255,0.04); padding: 20px; border-radius: 12px; 
            text-align: center; cursor: pointer; transition: var(--transition);
            border: 1px solid #222; text-decoration: none; color: white;
        }
        .action-card:hover { 
            background: var(--primary); transform: translateX(-10px); 
            box-shadow: 0 0 40px var(--primary); border-color: white;
        }
        .action-card i { font-size: 32px; margin-bottom: 10px; display: block; }

        .imdb-box { 
            background: #f5c518; color: #000; padding: 12px; border-radius: 8px; 
            font-weight: bold; display: flex; justify-content: space-between; align-items: center;
        }

        /* الجريد (الأفلام والمسلسلات) */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; margin-top: 20px; }
        .item-card { 
            position: relative; border-radius: 12px; overflow: hidden; border: 1px solid #222;
            transition: var(--transition); cursor: pointer; background: #111;
        }
        .item-card:hover { transform: scale(1.08) translateY(-10px); border-color: var(--primary); box-shadow: 0 0 35px var(--primary); z-index: 10; }
        .item-card img { width: 100%; height: 260px; object-fit: cover; }
        .item-card .badge { position: absolute; top: 10px; right: 10px; background: var(--primary); padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .item-card .title { padding: 10px; font-size: 13px; text-align: center; background: rgba(0,0,0,0.8); }

        /* الممثلين */
        .cast-row { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cast-member { min-width: 85px; text-align: center; transition: var(--transition); }
        .cast-member img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; margin-bottom: 5px; }

        /* مودال التريلر */
        #trailerModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(20px); }
        .modal-content { position:relative; width:90%; max-width:950px; box-shadow: 0 0 100px var(--primary); border-radius: 15px; overflow: hidden; }

        @media (max-width: 1100px) { .movie-layout { grid-template-columns: 1fr; } .action-col { flex-direction: row; flex-wrap: wrap; } .action-card { flex: 1; min-width: 140px; } }
    </style>
</head>
<body>

<div class="hero-section" id="heroSection">
    <div class="hero-overlay"></div>
    <div class="main-container">
        
        <div class="movie-layout">
            <div class="poster-col blur-container">
                <img src="" id="poster" class="blur-item">
            </div>

            <div class="info-col">
                <h1 id="movieTitle">Loading...</h1>
                
                <div class="section-box">
                    <div class="box-title"><i class="fa-solid fa-quote-right"></i> قصة العمل</div>
                    <p id="overview" style="line-height: 1.8; color: #ccc; font-size: 17px;"></p>
                </div>

                <div class="section-box">
                    <div class="box-title"><i class="fa-solid fa-circle-info"></i> التفاصيل</div>
                    <div class="details-list blur-container">
                        <div class="detail-item blur-item"><i class="fa-solid fa-square"></i> <b>القسم:</b> <span id="detCat">--</span></div>
                        <div class="detail-item blur-item"><i class="fa-solid fa-square"></i> <b>النوع:</b> <span id="detGenre">--</span></div>
                        <div class="detail-item blur-item"><i class="fa-solid fa-square"></i> <b>الجودة:</b> <span id="detQuality">1080p WEB-DL</span></div>
                        <div class="detail-item blur-item"><i class="fa-solid fa-square"></i> <b>السنة:</b> <span id="detYear">--</span></div>
                    </div>
                </div>

                <div class="section-box">
                    <div class="box-title"><i class="fa-solid fa-users"></i> الأبطال</div>
                    <div id="castContainer" class="cast-row blur-container"></div>
                </div>
            </div>

            <div class="action-col blur-container">
                <div class="action-card blur-item">
                    <i class="fa-solid fa-play-circle" style="color:var(--primary)"></i>
                    <span>مشاهدة الآن</span>
                </div>
                <div class="action-card blur-item">
                    <i class="fa-solid fa-download" style="color:var(--primary)"></i>
                    <span>تحميل مباشر</span>
                </div>
                <div id="openTrailer" class="action-card blur-item">
                    <i class="fa-brands fa-youtube" style="color:#ff0000"></i>
                    <span>العرض الدعائي</span>
                </div>
                <div class="imdb-box blur-item">
                    <span>IMDb RATING</span>
                    <span id="imdbRate">0.0</span>
                </div>
            </div>
        </div>

        <div id="seriesSection" style="display:none;">
            <div class="box-title" style="margin-top:40px;"><i class="fa-solid fa-layer-group"></i> المواسم</div>
            <div class="grid-container blur-container" id="seasonsGrid"></div>
            <div id="episodesArea" style="display:none; margin-top:30px;">
                <div class="box-title"><i class="fa-solid fa-tv"></i> الحلقات</div>
                <div class="grid-container blur-container" id="episodesGrid"></div>
            </div>
        </div>

        <div class="box-title" style="margin-top:50px;"><i class="fa-solid fa-wand-magic-sparkles"></i> أعمال مشابهة</div>
        <div class="grid-container blur-container" id="relatedGrid"></div>

    </div>
</div>

<div id="trailerModal">
    <div class="modal-content">
        <span id="closeTrailer" style="position:absolute; top:10px; left:10px; color:white; font-size:30px; cursor:pointer; z-index:10;"><i class="fa-solid fa-xmark"></i></span>
        <iframe id="trailerFrame" width="100%" height="550" src="" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<script>
    const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const type = params.get('type') || 'movie';

    async function init() {
        if(!id) return;
        try {
            const [rAR, rEN, rVid, rSim] = await Promise.all([
                fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=ar-SA`),
                fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=en-US&append_to_response=credits`),
                fetch(`https://api.themoviedb.org/3/${type}/${id}/videos?api_key=${API_KEY}`),
                fetch(`https://api.themoviedb.org/3/${type}/${id}/similar?api_key=${API_KEY}&language=en-US`)
            ]);

            const dAR = await rAR.json();
            const dEN = await rEN.json();
            const vids = await rVid.json();
            const similar = await rSim.json();

            // تطبيق الصيغة المطلوبة (English + مترجم اون لاين)
            document.getElementById('movieTitle').innerHTML = `${dEN.title || dEN.name} <span>مترجم اون لاين</span>`;
            document.getElementById('overview').innerText = dAR.overview || dEN.overview;
            document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${dEN.poster_path}`;
            document.getElementById('heroSection').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${dEN.backdrop_path})`;
            
            document.getElementById('detCat').innerText = type === 'tv' ? 'مسلسلات أجنبية' : 'أفلام أجنبية';
            document.getElementById('detGenre').innerText = dAR.genres?.map(g=>g.name).join(' / ') || '--';
            document.getElementById('detYear').innerText = (dEN.release_date || dEN.first_air_date || '').split('-')[0];
            document.getElementById('imdbRate').innerText = (dEN.vote_average || 0).toFixed(1);

            // الممثلين
            const ctn = document.getElementById('castContainer');
            dEN.credits?.cast.slice(0, 8).forEach(c => {
                if(c.profile_path) ctn.innerHTML += `<div class="cast-member blur-item"><img src="https://image.tmdb.org/t/p/w200${c.profile_path}"><p style="font-size:11px;">${c.name}</p></div>`;
            });

            // مشابهة (بالإنجليزي)
            const relBox = document.getElementById('relatedGrid');
            similar.results?.slice(0, 12).forEach(item => {
                relBox.innerHTML += `
                    <a href="?id=${item.id}&type=${type}" class="item-card blur-item" style="text-decoration:none; color:white;">
                        <img src="https://image.tmdb.org/t/p/w300${item.poster_path}">
                        <div class="title">${item.title || item.name}</div>
                    </a>`;
            });

            if(type === 'tv') {
                document.getElementById('seriesSection').style.display = 'block';
                const sGrid = document.getElementById('seasonsGrid');
                dEN.seasons?.filter(s => s.season_number > 0).forEach(s => {
                    sGrid.innerHTML += `<div class="item-card blur-item" onclick="loadEpisodes(${s.season_number})"><div class="badge">Season ${s.season_number}</div><img src="https://image.tmdb.org/t/p/w300${s.poster_path || dEN.poster_path}"><div class="title">Season ${s.season_number}</div></div>`;
                });
            }

            const trailer = vids.results?.find(v => v.type === 'Trailer');
            if(trailer) {
                document.getElementById('openTrailer').onclick = () => {
                    document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                    document.getElementById('trailerModal').style.display = 'flex';
                };
            }

        } catch(e) { console.error(e); }
    }

    async function loadEpisodes(sn) {
        const area = document.getElementById('episodesArea');
        const grid = document.getElementById('episodesGrid');
        grid.innerHTML = '<p style="padding:20px;">Loading...</p>';
        area.style.display = 'block';
        area.scrollIntoView({ behavior: 'smooth' });
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${sn}?api_key=${API_KEY}&language=en-US`);
        const data = await res.json();
        grid.innerHTML = '';
        data.episodes?.forEach(e => {
            grid.innerHTML += `<div class="item-card blur-item"><div class="badge">Episode ${e.episode_number}</div><img src="https://image.tmdb.org/t/p/w300${e.still_path || ''}"><div class="title">Episode ${e.episode_number}</div></div>`;
        });
    }

    document.getElementById('closeTrailer').onclick = () => {
        document.getElementById('trailerModal').style.display = 'none';
        document.getElementById('trailerFrame').src = '';
    };

    init();
</script>
</body>
</html>
