<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Premium Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #9b51e0; 
            --bg: #050505; 
            --card-bg: #111; 
            --text: #fff;
            --transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden;
            transition: background 0.8s ease; /* لتنظيف انتقال الخلفية */
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        /* الطبقة السوداء الشفافة فوق خلفية الصفحة لضمان وضوح الكلام */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); /* تعتيم الخلفية */
            z-index: -1;
        }

        /* --- الهيدر --- */
        .header { 
            background: rgba(10, 10, 10, 0.9); padding: 10px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; 
            backdrop-filter: blur(10px);
        }
        
        .right-section { display: flex; align-items: center; gap: 30px; }
        .logo-container { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-container img { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid var(--primary); }
        .logo-text { font-size: 18px; font-weight: bold; color: #fff; }

        .nav-menu { display: flex; list-style: none; gap: 20px; }
        .nav-link { color: #ccc; text-decoration: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { color: var(--primary); }

        /* --- تصغير حجم السلايدر (طلبك الأول) --- */
        .hero-slider { 
            width: 100%; 
            height: 320px; /* تم تصغير الارتفاع من 450 لـ 320 */
            position: relative; 
            overflow: hidden; 
            margin-bottom: 20px;
        }
        .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s ease; }
        .slide { min-width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        .slide-overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg), transparent); 
            display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 60px; 
        }
        .slide-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }

        /* --- شبكة الأفلام --- */
        .main-content { max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        .movie-card { 
            background: var(--card-bg); border-radius: 10px; overflow: hidden; 
            transition: var(--transition); border: 1px solid #222; position: relative; 
            cursor: pointer;
        }
        
        /* تأثير الحركة وتغيير الخلفية عند المرور بالماوس (طلبك الثاني) */
        .movie-card:hover { 
            transform: scale(1.05) translateY(-5px); 
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(155, 81, 224, 0.4);
        }

        .movie-card img { width: 100%; height: 240px; object-fit: cover; pointer-events: none; }
        .movie-card-info { padding: 10px; text-align: center; }
        .movie-card-title { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #searchBox { display: none; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        #searchBox input { width: 100%; max-width: 500px; margin: 0 auto; display: block; padding: 10px; border-radius: 20px; border: 1px solid var(--primary); background: #111; color: #fff; text-align: center; }

    </style>
</head>
<body id="mainBody">

    <header class="header">
        <div class="right-section">
            <a href="#" class="logo-container">
                <img src="https://i.ibb.co/5ggRsXdV/Red-Black-Modern-Movie-Cinema-Presentation-20260311-124846.jpg">
                <span class="logo-text">WATCHGO</span>
            </a>
            <ul class="nav-menu">
                <li><a class="nav-link" href="#">الرئيسية</a></li>
                <li><a class="nav-link" onclick="fetchApi('movie/popular')">أفلام</a></li>
                <li><a class="nav-link" onclick="fetchApi('tv/popular')">مسلسلات</a></li>
            </ul>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-magnifying-glass icon-btn" onclick="toggleSearch()"></i>
        </div>
    </header>

    <div id="searchBox"><input type="text" placeholder="ابحث..." onkeyup="searchApi(this.value)"></div>

    <div class="hero-slider">
        <div class="slider-wrapper" id="sliderWrapper"></div>
    </div>

    <div class="main-content">
        <h2 style="margin-bottom: 20px; font-size: 20px;">المقترحة لك</h2>
        <div class="movies-grid" id="moviesGrid"></div>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_ORIGINAL = 'https://image.tmdb.org/t/p/original';

        function toggleSearch() { 
            const s = document.getElementById("searchBox");
            s.style.display = (s.style.display === "block") ? "none" : "block"; 
        }

        async function fetchApi(endpoint) {
            const res = await fetch(`${BASE_URL}/${endpoint}?api_key=${API_KEY}&language=en-US`);
            const data = await res.json();
            renderMovies(data.results);
            if(endpoint.includes('popular')) renderSlider(data.results.slice(0, 5));
        }

        function renderSlider(movies) {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = movies.map(m => `
                <div class="slide" style="background-image: url('${IMG_ORIGINAL + m.backdrop_path}')">
                    <div class="slide-overlay"><div class="slide-title">${m.title || m.name}</div></div>
                </div>
            `).join('');
            let i = 0;
            setInterval(() => { i = (i + 1) % 5; wrapper.style.transform = `translateX(${i * 100}%)`; }, 5000);
        }

        function renderMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = movies.filter(m => m.poster_path).map(m => `
                <div class="movie-card" 
                     onmouseenter="changeBg('${IMG_ORIGINAL + (m.backdrop_path || m.poster_path)}')" 
                     onmouseleave="resetBg()">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    <div class="movie-card-info">
                        <div class="movie-card-title">${m.title || m.name}</div>
                    </div>
                </div>
            `).join('');
        }

        // دالة تغيير خلفية الصفحة (طلبك الثاني)
        function changeBg(url) {
            document.body.style.backgroundImage = `url('${url}')`;
        }

        function resetBg() {
            // يمكنك تركها فارغة لتبقى آخر صورة، أو إعادة اللون الأصلي
            // document.body.style.backgroundImage = 'none'; 
        }

        fetchApi('movie/popular');
    </script>
</body>
</html>
