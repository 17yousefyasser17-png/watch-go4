<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Ultimate Cinematic UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { 
            --primary: #9b51e0; 
            --bg: #050505; 
            --text: #ffffff; 
            --imdb-gold: #f5c518;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* --- تأثير البلور الشامل على الحاويات --- */
        .blur-container:hover .blur-item:not(:hover) { 
            filter: blur(6px) grayscale(0.5); 
            opacity: 0.4; 
            transform: scale(0.92);
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .hero-section {
            position: relative; width: 100%; min-height: 100vh;
            background-size: cover; background-position: center 20%; background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; padding: 50px 5%;
        }

        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.8) 60%, rgba(5,5,5,1) 100%);
            z-index: 1;
        }

        .movie-layout { 
            position: relative; z-index: 2; display: grid; grid-template-columns: 300px 1fr; 
            gap: 40px; width: 100%; max-width: 1400px; margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* --- البوستر مع الجلو --- */
        .side-panel { display: flex; flex-direction: column; gap: 15px; }
        .poster { 
            width: 100%; border-radius: 12px; border: 2px solid var(--primary); 
            box-shadow: 0 0 20px rgba(155, 81, 224, 0.3);
            transition: var(--transition);
        }
        .poster:hover { transform: scale(1.03); box-shadow: 0 0 40px var(--primary); }

        .btn {
            padding: 14px; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer;
            border: none; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 15px; transition: var(--transition); color: white; text-decoration: none;
        }
        .btn-watch { background: var(--primary); }
        .btn-download { background: rgba(34, 34, 34, 0.8); border: 1px solid #444; }
        .btn-trailer { background: #ff0000; }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 5px 20px rgba(255,255,255,0.2); filter: brightness(1.2); }

        .content-panel h1 { font-size: 45px; margin-bottom: 15px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .section-header { display: flex; align-items: center; gap: 10px; color: var(--primary); font-size: 20px; margin: 25px 0 15px; font-weight: bold; }
        .overview { font-size: 16px; line-height: 1.8; color: #ddd; background: var(--glass); padding: 20px; border-radius: 12px; border-right: 4px solid var(--primary); backdrop-filter: blur(5px); }

        /* --- الكروت الموحدة (أفلام، مواسم، حلقات) --- */
        .items-grid { display: grid; gap: 20px; margin-bottom: 30px; }
        #seasonsGrid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        #episodesGrid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }

        .item-card {
            position: relative; background: #111; border-radius: 12px; overflow: hidden;
            cursor: pointer; transition: var(--transition); border: 1px solid #222;
        }
        .item-card:hover { transform: scale(1.1) translateY(-10px); border-color: var(--primary); box-shadow: 0 0 30px var(--primary); z-index: 10; }
        .item-card.active { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); border-width: 2px; }

        .item-card img { width: 100%; object-fit: cover; display: block; }
        #seasonsGrid img { height: 230px; }
        #episodesGrid img { height: 130px; }
        .item-badge { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; z-index: 2; }
        .item-info { padding: 12px; text-align: center; background: rgba(0,0,0,0.85); font-size: 13px; position: absolute; bottom: 0; width: 100%; border-top: 1px solid var(--glass); }

        /* --- الممثلين ومعلومات العمل --- */
        .details-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .detail-card { background: rgba(20, 20, 20, 0.7); padding: 12px 18px; border-radius: 8px; border: 1px solid var(--glass); display: flex; justify-content: space-between; transition: 0.3s; }
        .detail-card:hover { background: rgba(155, 81, 224, 0.1); border-color: var(--primary); }
        .detail-card b { color: var(--primary); }

        .cast-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cast-item { min-width: 100px; text-align: center; transition: var(--transition); }
        .cast-item:hover { transform: scale(1.15); filter: drop-shadow(0 0 10px var(--primary)); }
        .cast-item img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); margin-bottom: 8px; }

        /* --- الأفلام المشابهة --- */
        .related-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .related-card img { width: 100%; border-radius: 10px; transition: var(--transition); border: 1px solid #222; }
        .related-card:hover img { transform: scale(1.1); box-shadow: 0 0 25px var(--primary); border-color: var(--primary); }

        /* --- المودال (نافذة التريلر) --- */
        #trailerModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; justify-content:center; align-items:center; backdrop-filter: blur(15px); }
        .modal-content { position:relative; width:90%; max-width:1000px; animation: fadeInUp 0.5s ease; }
        
        @media (max-width: 1000px) {
            .movie-layout { grid-template-columns: 1fr; }
            .related-grid { grid-template-columns: repeat(3, 1fr); }
            .side-panel { align-items: center; }
            .poster { max-width: 240px; }
        }
    </style>
</head>
<body>

    <div class="hero-section" id="heroSection">
        <div class="hero-overlay"></div>
        <div class="movie-layout">
            <div class="side-panel">
                <img src="" id="poster" class="poster blur-item">
                <button class="btn btn-watch"><i class="fa-solid fa-play"></i> المشاهدة الآن</button>
                <button class="btn btn-download"><i class="fa-solid fa-download"></i> تحميل مباشر</button>
                <button id="openTrailer" class="btn btn-trailer"><i class="fa-brands fa-youtube"></i> العرض الدعائي</button>
            </div>

            <div class="content-panel">
                <h1 id="movieTitle">جاري التحميل...</h1>
                
                <div class="section-header"><i class="fa-solid fa-align-right"></i> قصة العمل</div>
                <p id="movieOverview" class="overview">يرجى الانتظار بينما نقوم بجلب التفاصيل بالعربية...</p>

                <div id="seriesSection" style="display:none;">
                    <div class="section-header"><i class="fa-solid fa-layer-group"></i> المواسم المتاحة</div>
                    <div class="blur-container">
                        <div class="items-grid" id="seasonsGrid"></div>
                    </div>
                    
                    <div id="episodesArea" style="display:none; margin-top: 20px;">
                        <div class="section-header"><i class="fa-solid fa-tv"></i> الحلقات</div>
                        <div class="blur-container">
                            <div class="items-grid" id="episodesGrid"></div>
                        </div>
                    </div>
                </div>

                <div class="section-header"><i class="fa-solid fa-circle-info"></i> معلومات إضافية</div>
                <div class="details-grid blur-container">
                    <div class="detail-card blur-item"><b>القسم:</b><span id="detCategory">--</span></div>
                    <div class="detail-card blur-item"><b>النوع:</b><span id="detGenre">--</span></div>
                    <div class="detail-card blur-item"><b>المدة:</b><span id="detRuntime">--</span></div>
                    <div class="detail-card blur-item"><b>السنة:</b><span id="detYear">----</span></div>
                    <div class="detail-card blur-item"><b>التقييم:</b><span id="imdbRate">--</span></div>
                    <div class="detail-card blur-item"><b>اللغة:</b><span id="detLang">--</span></div>
                </div>

                <div class="section-header"><i class="fa-solid fa-users"></i> طاقم التمثيل</div>
                <div id="castContainer" class="cast-scroll blur-container"></div>
            </div>
        </div>

        <div class="related-section">
            <div class="section-header"><i class="fa-solid fa-wand-magic-sparkles"></i> أعمال قد تعجبك</div>
            <div class="related-grid blur-container" id="relatedGrid"></div>
        </div>
    </div>

    <div id="trailerModal">
        <div class="modal-content">
            <span id="closeTrailer" style="position:absolute; top:-40px; left:0; color:white; font-size:30px; cursor:pointer;"><i class="fa-solid fa-xmark"></i> إغلاق</span>
            <iframe id="trailerFrame" width="100%" height="550" src="" frameborder="0" allowfullscreen style="border-radius:15px; box-shadow: 0 0 50px var(--primary);"></iframe>
        </div>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const urlParams = new URLSearchParams(window.location.search);
        const movie_id = urlParams.get('id');
        const movie_type = urlParams.get('type') || 'movie';

        async function init() {
            if(!movie_id) return;

            try {
                // جلب البيانات بالعربية والإنجليزية معاً لضمان أفضل نتيجة
                const [resAR, resEN, resVideos, resSimilar] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/${movie_type}/${movie_id}?api_key=${API_KEY}&language=ar-SA`),
                    fetch(`https://api.themoviedb.org/3/${movie_type}/${movie_id}?api_key=${API_KEY}&language=en-US&append_to_response=credits`),
                    fetch(`https://api.themoviedb.org/3/${movie_type}/${movie_id}/videos?api_key=${API_KEY}`),
                    fetch(`https://api.themoviedb.org/3/${movie_type}/${movie_id}/similar?api_key=${API_KEY}&language=ar-SA`)
                ]);

                const dataAR = await resAR.json();
                const dataEN = await resEN.json();
                const videos = await resVideos.json();
                const similar = await resSimilar.json();

                // 1. تعريب القصة بشكل ذكي
                document.getElementById('movieTitle').innerText = dataAR.title || dataAR.name || dataEN.title || dataEN.name;
                document.getElementById('movieOverview').innerText = dataAR.overview || dataEN.overview || "للأسف، لا يوجد وصف متوفر لهذا العمل حالياً.";

                // 2. الصور
                document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${dataEN.poster_path}`;
                document.getElementById('heroSection').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${dataEN.backdrop_path})`;

                // 3. المعلومات
                document.getElementById('detGenre').innerText = dataAR.genres?.map(g => g.name).join(' - ') || '--';
                document.getElementById('detYear').innerText = (dataEN.release_date || dataEN.first_air_date || '').split('-')[0];
                document.getElementById('imdbRate').innerText = (dataEN.vote_average || 0).toFixed(1) + ' / 10';
                document.getElementById('detLang').innerText = dataEN.original_language?.toUpperCase();

                if(movie_type === 'tv') {
                    document.getElementById('detCategory').innerText = 'مسلسل تلفزيوني';
                    document.getElementById('detRuntime').innerText = dataEN.number_of_episodes + ' حلقة';
                    renderSeasons(dataEN.seasons);
                } else {
                    document.getElementById('detCategory').innerText = 'فيلم سينمائي';
                    document.getElementById('detRuntime').innerText = (dataEN.runtime || '--') + ' دقيقة';
                }

                // 4. الممثلين مع تأثير البلور
                const castBox = document.getElementById('castContainer');
                dataEN.credits?.cast.slice(0, 12).forEach(person => {
                    if(person.profile_path) {
                        castBox.innerHTML += `
                            <div class="cast-item blur-item">
                                <img src="https://image.tmdb.org/t/p/w200${person.profile_path}">
                                <p style="font-size:12px; font-weight:bold;">${person.name}</p>
                            </div>`;
                    }
                });

                // 5. الأفلام المشابهة
                const similarBox = document.getElementById('relatedGrid');
                similar.results?.slice(0, 6).forEach(item => {
                    similarBox.innerHTML += `
                        <a href="?id=${item.id}&type=${movie_type}" class="related-card blur-item">
                            <img src="https://image.tmdb.org/t/p/w300${item.poster_path}">
                        </a>`;
                });

                // 6. تشغيل التريلر (أي فيلم أو مسلسل)
                const trailer = videos.results?.find(v => v.type === 'Trailer' || v.type === 'Teaser');
                if(trailer) {
                    document.getElementById('openTrailer').onclick = () => {
                        document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                        document.getElementById('trailerModal').style.display = 'flex';
                    };
                } else {
                    document.getElementById('openTrailer').style.display = 'none';
                }

            } catch(err) { console.error("Error fetching data:", err); }
        }

        function renderSeasons(seasons) {
            const grid = document.getElementById('seasonsGrid');
            document.getElementById('seriesSection').style.display = 'block';
            seasons.filter(s => s.season_number > 0).forEach(s => {
                const card = document.createElement('div');
                card.className = 'item-card blur-item';
                card.innerHTML = `
                    <div class="item-badge">الموسم ${s.season_number}</div>
                    <img src="https://image.tmdb.org/t/p/w300${s.poster_path || ''}" onerror="this.src='https://via.placeholder.com/300x450'">
                    <div class="item-info"><b>الموسم ${s.season_number} مترجم</b></div>
                `;
                card.onclick = () => {
                    document.querySelectorAll('#seasonsGrid .item-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    loadEpisodes(s.season_number);
                };
                grid.appendChild(card);
            });
        }

        async function loadEpisodes(sn) {
            const area = document.getElementById('episodesArea');
            const grid = document.getElementById('episodesGrid');
            grid.innerHTML = '<p style="padding:20px; color:var(--primary);">جاري تحميل الحلقات...</p>';
            area.style.display = 'block';
            area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            const res = await fetch(`https://api.themoviedb.org/3/tv/${movie_id}/season/${sn}?api_key=${API_KEY}&language=ar-SA`);
            const data = await res.json();
            grid.innerHTML = '';
            data.episodes?.forEach(e => {
                grid.innerHTML += `
                    <div class="item-card blur-item">
                        <div class="item-badge">الحلقة ${e.episode_number}</div>
                        <img src="https://image.tmdb.org/t/p/w300${e.still_path || ''}" onerror="this.src='https://via.placeholder.com/300x170'">
                        <div class="item-info"><b>الحلقة ${e.episode_number} مترجمة</b></div>
                    </div>`;
            });
        }

        document.getElementById('closeTrailer').onclick = () => {
            document.getElementById('trailerModal').style.display = 'none';
            document.getElementById('trailerFrame').src = '';
        };

        init();
    </script>
</body>
</html>
