<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Premium UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #9b51e0; --bg: #050505; --text: #ffffff; --imdb-gold: #f5c518; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow-x: hidden; 
        }

        /* --- أنميشن الظهور --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(155, 81, 224, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(155, 81, 224, 0); }
            100% { box-shadow: 0 0 0 0 rgba(155, 81, 224, 0); }
        }

        .hero-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            background-size: cover;
            background-position: center 20%;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 5%;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.8) 60%, rgba(5,5,5,1) 100%);
            z-index: 1;
        }

        .movie-layout { 
            position: relative;
            z-index: 2;
            display: grid; 
            grid-template-columns: 300px 1fr; 
            gap: 40px; 
            width: 100%;
            max-width: 1400px;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .side-panel { display: flex; flex-direction: column; gap: 15px; }
        .poster { 
            width: 100%; 
            border-radius: 12px; 
            border: 2px solid var(--primary); 
            box-shadow: 0 0 30px rgba(155, 81, 224, 0.2);
            animation: scaleIn 1s ease-out;
        }

        .btn {
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 15px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white;
            text-decoration: none;
        }
        .btn-watch { 
            background: var(--primary); 
            animation: pulse 2s infinite; 
        }
        .btn-download { background: rgba(34, 34, 34, 0.8); border: 1px solid #444; }
        .btn-trailer { background: #ff0000; }
        
        .btn:hover { 
            transform: translateY(-5px) scale(1.02); 
            filter: brightness(1.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .content-panel h1 { 
            font-size: 45px; 
            margin-bottom: 15px; 
            text-align: right;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            font-size: 20px;
            margin: 25px 0 10px;
            font-weight: bold;
        }

        .overview { 
            font-size: 16px; 
            line-height: 1.8; 
            color: #ddd; 
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 12px;
            border-right: 4px solid var(--primary);
            transition: 0.3s;
        }
        .overview:hover { background: rgba(255,255,255,0.06); }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        .detail-card {
            background: rgba(20, 20, 20, 0.7);
            padding: 12px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            transition: 0.3s;
        }
        .detail-card:hover { border-color: var(--primary); transform: translateX(-5px); }
        .detail-card b { color: var(--primary); display: flex; align-items: center; gap: 8px; font-size: 14px; }

        .cast-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cast-item { 
            min-width: 90px; 
            text-align: center; 
            transition: 0.4s;
        }
        .cast-item:hover { transform: scale(1.1); }
        .cast-item img { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .cast-item p { font-size: 12px; margin-top: 8px; color: #bbb; }

        /* --- تنسيقات المسلسلات الجديدة --- */
        #seriesSection { display: none; margin-top: 20px; }
        .season-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .season-btn { 
            padding: 10px 20px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; cursor: pointer; white-space: nowrap; 
            transition: 0.3s;
        }
        .season-btn.active { background: var(--primary); border-color: var(--primary); }
        
        .episodes-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); 
            gap: 10px; margin-top: 15px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px;
        }
        .episode-card { 
            background: #1a1a1a; padding: 15px 5px; text-align: center; border-radius: 8px; border: 1px solid #333; 
            cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 14px;
        }
        .episode-card:hover { background: var(--primary); transform: scale(1.1); }

        .related-section { position: relative; z-index: 2; width: 100%; max-width: 1400px; padding-bottom: 50px; }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .related-card { transition: 0.4s; border-radius: 8px; overflow: hidden; }
        .related-card img { width: 100%; transition: 0.4s; border: 1px solid #333; }
        .related-card:hover { transform: scale(1.08); box-shadow: 0 0 20px var(--primary); z-index: 5; }

        #trailerModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; justify-content:center; align-items:center; }
        
        @media (max-width: 1000px) {
            .movie-layout { grid-template-columns: 1fr; }
            .related-grid { grid-template-columns: repeat(3, 1fr); }
            .side-panel { align-items: center; }
            .poster { max-width: 280px; }
        }
    </style>
</head>
<body>

    <div class="hero-section" id="heroSection">
        <div class="hero-overlay"></div>
        
        <div class="movie-layout">
            <div class="side-panel">
                <img src="" id="poster" class="poster">
                <button class="btn btn-watch"><i class="fa-solid fa-play"></i> المشاهدة الآن</button>
                <button class="btn btn-download"><i class="fa-solid fa-download"></i> تحميل الفيلم</button>
                <button id="openTrailer" class="btn btn-trailer"><i class="fa-brands fa-youtube"></i> العرض الدعائي</button>
            </div>

            <div class="content-panel">
                <h1 id="movieTitleEN">Movie Title</h1>
                
                <div class="section-header"><i class="fa-solid fa-align-right"></i> قصة العمل</div>
                <p id="movieOverviewAR" class="overview">...</p>

                <div id="seriesSection">
                    <div class="section-header"><i class="fa-solid fa-layer-group"></i> المواسم والحلقات</div>
                    <div class="season-tabs" id="seasonTabs"></div>
                    <div class="episodes-grid" id="episodesGrid"></div>
                </div>

                <div class="section-header"><i class="fa-solid fa-list-check"></i> معلومات العمل</div>
                <div class="details-grid">
                    <div class="detail-card"><b><i class="fa-solid fa-film"></i> القسم:</b><span id="detCategory">---</span></div>
                    <div class="detail-card"><b><i class="fa-solid fa-tags"></i> النوع:</b><span id="detGenre">---</span></div>
                    <div class="detail-card"><b><i class="fa-solid fa-clock"></i> المدة/الحلقات:</b><span id="detRuntime">--</span></div>
                    <div class="detail-card"><b><i class="fa-solid fa-calendar"></i> السنة:</b><span id="detYear">----</span></div>
                    <div class="detail-card"><b><i class="fa-solid fa-star" style="color:var(--imdb-gold)"></i> التقييم:</b><span id="imdbRate">-- / 10</span></div>
                    <div class="detail-card"><b><i class="fa-solid fa-globe"></i> اللغة:</b><span id="detLang">--</span></div>
                </div>

                <div class="section-header"><i class="fa-solid fa-users"></i> نجوم العمل</div>
                <div id="castContainer" class="cast-scroll"></div>
            </div>
        </div>

        <div class="related-section">
            <div class="section-header"><i class="fa-solid fa-layer-group"></i> أعمال قد تعجبك</div>
            <div class="related-grid" id="relatedGrid"></div>
        </div>
    </div>

    <div id="trailerModal">
        <div style="position:relative; width:90%; max-width:900px;">
            <span id="closeTrailer" style="position:absolute; top:-40px; right:0; color:white; font-size:30px; cursor:pointer;">&times; إغلاق</span>
            <iframe id="trailerFrame" width="100%" height="500" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const params = new URLSearchParams(window.location.search);
        const movieId = params.get('id');
        const type = params.get('type') || 'movie';

        async function loadData() {
            if(!movieId) return;
            const [resAR, resEN, resRelated] = await Promise.all([
                fetch(`https://api.themoviedb.org/3/${type}/${movieId}?api_key=${API_KEY}&language=ar-SA`),
                fetch(`https://api.themoviedb.org/3/${type}/${movieId}?api_key=${API_KEY}&language=en-US&append_to_response=credits,videos`),
                fetch(`https://api.themoviedb.org/3/${type}/${movieId}/similar?api_key=${API_KEY}&language=ar-SA`)
            ]);
            const dataAR = await resAR.json();
            const dataEN = await resEN.json();
            const dataRelated = await resRelated.json();

            document.getElementById('movieTitleEN').innerText = dataEN.title || dataEN.name;
            document.getElementById('movieOverviewAR').innerText = dataAR.overview || "الوصف غير متاح بالعربية.";
            document.getElementById('poster').src = 'https://image.tmdb.org/t/p/w500' + dataEN.poster_path;
            document.getElementById('heroSection').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${dataEN.backdrop_path})`;
            document.getElementById('detGenre').innerText = dataAR.genres.slice(0, 2).map(g => g.name).join(' / ');
            document.getElementById('detYear').innerText = (dataEN.release_date || dataEN.first_air_date || '').split('-')[0];
            document.getElementById('imdbRate').innerText = dataEN.vote_average.toFixed(1) + ' / 10';
            document.getElementById('detLang').innerText = dataEN.original_language.toUpperCase();
            
            // تخصيص القسم (فيلم أم مسلسل)
            if(type === 'tv') {
                document.getElementById('detCategory').innerText = 'مسلسلات';
                document.getElementById('detRuntime').innerText = dataEN.number_of_episodes + ' حلقة';
                loadSeriesDetails(dataEN.seasons);
            } else {
                document.getElementById('detCategory').innerText = 'أفلام';
                document.getElementById('detRuntime').innerText = (dataEN.runtime || '--') + ' دقيقة';
            }

            // الممثلين
            const castCont = document.getElementById('castContainer');
            dataEN.credits.cast.slice(0, 10).forEach(c => {
                if(c.profile_path) {
                    castCont.innerHTML += `<div class="cast-item"><img src="https://image.tmdb.org/t/p/w200${c.profile_path}"><p>${c.name}</p></div>`;
                }
            });

            // أعمال مشابهة
            const relatedGrid = document.getElementById('relatedGrid');
            dataRelated.results.slice(0, 6).forEach(item => {
                if(item.poster_path) {
                    relatedGrid.innerHTML += `
                        <a href="?id=${item.id}&type=${type}" class="related-card">
                            <img src="https://image.tmdb.org/t/p/w300${item.poster_path}">
                        </a>`;
                }
            });

            // التريلر
            const trailer = dataEN.videos.results.find(v => v.type === 'Trailer');
            if(trailer) {
                document.getElementById('openTrailer').onclick = () => {
                    document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                    document.getElementById('trailerModal').style.display = 'flex';
                };
            } else {
                document.getElementById('openTrailer').style.display = 'none';
            }
        }

        // وظيفة جلب المواسم والحلقات
        function loadSeriesDetails(seasons) {
            const seriesSection = document.getElementById('seriesSection');
            const seasonTabs = document.getElementById('seasonTabs');
            seriesSection.style.display = 'block';

            // تصفية المواسم (تجنب موسم 0 إلا لو موجود فعلياً)
            const validSeasons = seasons.filter(s => s.season_number > 0);

            validSeasons.forEach((season, index) => {
                const btn = document.createElement('button');
                btn.className = `season-btn ${index === 0 ? 'active' : ''}`;
                btn.innerText = `الموسم ${season.season_number}`;
                btn.onclick = () => {
                    document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showEpisodes(season.season_number, season.episode_count);
                };
                seasonTabs.appendChild(btn);
            });

            // عرض حلقات أول موسم تلقائياً
            if(validSeasons.length > 0) {
                showEpisodes(validSeasons[0].season_number, validSeasons[0].episode_count);
            }
        }

        function showEpisodes(seasonNum, count) {
            const grid = document.getElementById('episodesGrid');
            grid.innerHTML = ''; // تنظيف الحلقات القديمة
            for(let i=1; i<=count; i++) {
                grid.innerHTML += `<div class="episode-card" title="الحلقة ${i}">E${i}</div>`;
            }
        }

        document.getElementById('closeTrailer').onclick = () => {
            document.getElementById('trailerModal').style.display = 'none';
            document.getElementById('trailerFrame').src = '';
        };

        loadData();
    </script>
</body>
</html>
