<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Premium UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { 
            --primary: #9b51e0; 
            --bg: #050505; 
            --text: #ffffff; 
            --imdb-gold: #f5c518;
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .hero-section {
            position: relative; width: 100%; min-height: 100vh;
            background-size: cover; background-position: center 20%; background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; padding: 50px 5%;
        }

        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.8) 60%, rgba(5,5,5,1) 100%);
            z-index: 1;
        }

        .movie-layout { 
            position: relative; z-index: 2; display: grid; grid-template-columns: 300px 1fr; 
            gap: 40px; width: 100%; max-width: 1400px; margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .side-panel { display: flex; flex-direction: column; gap: 15px; }
        .poster { width: 100%; border-radius: 12px; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(155, 81, 224, 0.2); }

        .btn {
            padding: 14px; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer;
            border: none; display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 15px; transition: 0.4s; color: white; text-decoration: none;
        }
        .btn-watch { background: var(--primary); }
        .btn-download { background: rgba(34, 34, 34, 0.8); border: 1px solid #444; }
        .btn-trailer { background: #ff0000; }
        .btn:hover { transform: translateY(-5px); filter: brightness(1.2); }

        .content-panel h1 { font-size: 45px; margin-bottom: 15px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .section-header { display: flex; align-items: center; gap: 10px; color: var(--primary); font-size: 20px; margin: 25px 0 15px; font-weight: bold; }
        .overview { font-size: 16px; line-height: 1.8; color: #ddd; background: var(--glass); padding: 20px; border-radius: 12px; border-right: 4px solid var(--primary); backdrop-filter: blur(5px); }

        /* --- نظام الـ Blur و الـ Glow الذكي --- */
        .cards-wrapper { transition: 0.3s; }
        .cards-wrapper:hover .item-card:not(:hover) { 
            filter: blur(5px) grayscale(0.7); 
            opacity: 0.4; 
            transform: scale(0.92);
        }

        #seriesSection { display: none; margin-top: 30px; width: 100%; }
        .items-grid { display: grid; gap: 20px; margin-bottom: 30px; }
        #seasonsGrid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        #episodesGrid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }

        .item-card {
            position: relative; background: #111; border-radius: 12px; overflow: hidden;
            cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #222;
        }
        /* الوهج البنفسجي عند الوقوف بالماوس */
        .item-card:hover { 
            transform: scale(1.1) translateY(-10px); 
            border-color: var(--primary); 
            box-shadow: 0 0 30px var(--primary); 
            z-index: 10; 
        }
        .item-card.active { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); border-width: 2px; }

        .item-card img { width: 100%; object-fit: cover; display: block; }
        #seasonsGrid img { height: 230px; }
        #episodesGrid img { height: 130px; }

        .item-badge { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; z-index: 2; }
        .item-info { padding: 12px; text-align: center; background: rgba(0,0,0,0.85); font-size: 13px; position: absolute; bottom: 0; width: 100%; border-top: 1px solid var(--glass); }

        .episodes-wrapper { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; display: none; margin-top: 15px; border: 1px solid var(--glass); animation: fadeInUp 0.5s ease; }

        .details-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .detail-card { background: rgba(20, 20, 20, 0.7); padding: 12px 18px; border-radius: 8px; border: 1px solid var(--glass); display: flex; justify-content: space-between; align-items: center; }
        .detail-card b { color: var(--primary); font-size: 14px; }

        .cast-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cast-item { min-width: 90px; text-align: center; transition: 0.3s; }
        .cast-item:hover { transform: scale(1.1); }
        .cast-item img { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .cast-item p { font-size: 12px; margin-top: 8px; color: #bbb; }

        .related-section { position: relative; z-index: 2; width: 100%; max-width: 1400px; padding: 50px 0; }
        .related-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .related-card img { width: 100%; border-radius: 8px; transition: 0.4s; border: 1px solid #222; }
        .related-card:hover img { transform: scale(1.08); box-shadow: 0 0 20px var(--primary); border-color: var(--primary); }

        #trailerModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; justify-content:center; align-items:center; backdrop-filter: blur(10px); }
        
        @media (max-width: 1000px) {
            .movie-layout { grid-template-columns: 1fr; }
            #seasonsGrid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            #episodesGrid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .related-grid { grid-template-columns: repeat(3, 1fr); }
            .side-panel { align-items: center; }
            .poster { max-width: 250px; }
        }
    </style>
</head>
<body>

    <div class="hero-section" id="heroSection">
        <div class="hero-overlay"></div>
        <div class="movie-layout">
            <div class="side-panel">
                <img src="" id="poster" class="poster">
                <button class="btn btn-watch"><i class="fa-solid fa-play"></i> المشاهدة الآن</button>
                <button class="btn btn-download"><i class="fa-solid fa-download"></i> تحميل بجودة عالية</button>
                <button id="openTrailer" class="btn btn-trailer"><i class="fa-brands fa-youtube"></i> العرض الدعائي</button>
            </div>

            <div class="content-panel">
                <h1 id="movieTitle">جاري التحميل...</h1>
                <div class="section-header"><i class="fa-solid fa-align-right"></i> قصة العمل</div>
                <p id="movieOverview" class="overview">يرجى الانتظار...</p>

                <div id="seriesSection">
                    <div class="section-header"><i class="fa-solid fa-layer-group"></i> المواسم المتاحة</div>
                    <div class="cards-wrapper">
                        <div class="items-grid" id="seasonsGrid"></div>
                    </div>
                    
                    <div id="episodesArea" class="episodes-wrapper">
                        <div class="section-header" style="margin:0 0 15px 0;"><i class="fa-solid fa-tv"></i> الحلقات</div>
                        <div class="cards-wrapper">
                            <div class="items-grid" id="episodesGrid"></div>
                        </div>
                    </div>
                </div>

                <div class="section-header"><i class="fa-solid fa-list-check"></i> معلومات العمل</div>
                <div class="details-grid">
                    <div class="detail-card"><b><i class="fa-solid fa-film"></i> القسم:</b><span id="detCategory">--</span></div>
                    <div class="detail-card"><b><i class="fa-solid fa-tags"></i> النوع:</b><span id="detGenre">--</span></div>
                    <div class="detail-card"><b><i class="fa-solid fa-clock"></i> المدة/الحلقات:</b><span id="detRuntime">--</span></div>
                    <div class="detail-card"><b><i class="fa-solid fa-calendar"></i> السنة:</b><span id="detYear">----</span></div>
                    <div class="detail-card"><b><i class="fa-solid fa-star" style="color:var(--imdb-gold)"></i> التقييم:</b><span id="imdbRate">--</span></div>
                    <div class="detail-card"><b><i class="fa-solid fa-globe"></i> اللغة:</b><span id="detLang">--</span></div>
                </div>

                <div class="section-header"><i class="fa-solid fa-users"></i> نجوم العمل</div>
                <div id="castContainer" class="cast-scroll"></div>
            </div>
        </div>

        <div class="related-section">
            <div class="section-header"><i class="fa-solid fa-layer-group"></i> أعمال مشابهة</div>
            <div class="related-grid" id="relatedGrid"></div>
        </div>
    </div>

    <div id="trailerModal">
        <div style="position:relative; width:90%; max-width:900px;">
            <span id="closeTrailer" style="position:absolute; top:-40px; right:0; color:white; font-size:30px; cursor:pointer;">&times; إغلاق</span>
            <iframe id="trailerFrame" width="100%" height="500" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
        const params = new URLSearchParams(window.location.search);
        const movieId = params.get('id');
        const type = params.get('type') || 'movie';

        async function loadData() {
            if(!movieId) {
                document.getElementById('movieTitle').innerText = "خطأ: لم يتم العثور على المعرف!";
                return;
            }

            try {
                const [resAR, resEN, resRelated] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/${type}/${movieId}?api_key=${API_KEY}&language=ar-SA`),
                    fetch(`https://api.themoviedb.org/3/${type}/${movieId}?api_key=${API_KEY}&language=en-US&append_to_response=credits,videos`),
                    fetch(`https://api.themoviedb.org/3/${type}/${movieId}/similar?api_key=${API_KEY}&language=ar-SA`)
                ]);
                
                const dataAR = await resAR.json();
                const dataEN = await resEN.json();
                const dataRelated = await resRelated.json();

                // العناوين والوصف
                document.getElementById('movieTitle').innerText = dataEN.title || dataEN.name;
                document.getElementById('movieOverview').innerText = dataAR.overview || dataEN.overview || "لا يوجد وصف متاح باللغة العربية.";
                
                // الصور والخلفية
                const posterImg = dataEN.poster_path ? `https://image.tmdb.org/t/p/w500${dataEN.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Poster';
                document.getElementById('poster').src = posterImg;
                if(dataEN.backdrop_path) {
                    document.getElementById('heroSection').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${dataEN.backdrop_path})`;
                }

                // معلومات إضافية
                document.getElementById('detGenre').innerText = dataAR.genres?.slice(0, 2).map(g => g.name).join(' / ') || 'غير محدد';
                document.getElementById('detYear').innerText = (dataEN.release_date || dataEN.first_air_date || '----').split('-')[0];
                document.getElementById('imdbRate').innerText = (dataEN.vote_average || 0).toFixed(1) + ' / 10';
                document.getElementById('detLang').innerText = (dataEN.original_language || '--').toUpperCase();
                
                if(type === 'tv') {
                    document.getElementById('detCategory').innerText = 'مسلسل';
                    document.getElementById('detRuntime').innerText = (dataEN.number_of_episodes || '--') + ' حلقة';
                    renderSeasons(dataEN.seasons);
                } else {
                    document.getElementById('detCategory').innerText = 'فيلم';
                    document.getElementById('detRuntime').innerText = (dataEN.runtime || '--') + ' دقيقة';
                }

                // عرض طاقم العمل
                const castCont = document.getElementById('castContainer');
                dataEN.credits?.cast.slice(0, 10).forEach(c => {
                    if(c.profile_path) {
                        castCont.innerHTML += `
                            <div class="cast-item">
                                <img src="https://image.tmdb.org/t/p/w200${c.profile_path}">
                                <p>${c.name}</p>
                            </div>`;
                    }
                });

                // عرض الأفلام المشابهة
                const relatedGrid = document.getElementById('relatedGrid');
                dataRelated.results?.slice(0, 6).forEach(item => {
                    if(item.poster_path) {
                        relatedGrid.innerHTML += `
                            <a href="?id=${item.id}&type=${type}" class="related-card">
                                <img src="https://image.tmdb.org/t/p/w300${item.poster_path}">
                            </a>`;
                    }
                });

                // العرض الدعائي
                const trailer = dataEN.videos?.results.find(v => v.type === 'Trailer');
                if(trailer) {
                    document.getElementById('openTrailer').onclick = () => {
                        document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                        document.getElementById('trailerModal').style.display = 'flex';
                    };
                } else {
                    document.getElementById('openTrailer').style.display = 'none';
                }

            } catch(e) {
                console.error("Error Loading Page:", e);
                document.getElementById('movieTitle').innerText = "حدث خطأ في جلب البيانات.";
            }
        }

        // دالة إنشاء كروت المواسم
        function renderSeasons(seasons) {
            const grid = document.getElementById('seasonsGrid');
            document.getElementById('seriesSection').style.display = 'block';
            const valid = seasons.filter(s => s.season_number > 0);

            valid.forEach(s => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-badge">الموسم ${s.season_number}</div>
                    <img src="https://image.tmdb.org/t/p/w300${s.poster_path || ''}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                    <div class="item-info"><b>الموسم ${s.season_number} مترجم</b></div>
                `;
                card.onclick = () => {
                    document.querySelectorAll('#seasonsGrid .item-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    fetchEpisodes(s.season_number);
                };
                grid.appendChild(card);
            });
        }

        // دالة جلب الحلقات
        async function fetchEpisodes(sn) {
            const area = document.getElementById('episodesArea');
            const grid = document.getElementById('episodesGrid');
            grid.innerHTML = '<p style="padding:20px; color:var(--primary); text-align:center; width:100%;">جاري تحميل الحلقات بصبر...</p>';
            area.style.display = 'block';
            area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            try {
                const res = await fetch(`https://api.themoviedb.org/3/tv/${movieId}/season/${sn}?api_key=${API_KEY}&language=ar-SA`);
                const data = await res.json();
                grid.innerHTML = '';
                
                if(data.episodes) {
                    data.episodes.forEach(e => {
                        const card = document.createElement('div');
                        card.className = 'item-card';
                        card.innerHTML = `
                            <div class="item-badge">الحلقة ${e.episode_number}</div>
                            <img src="https://image.tmdb.org/t/p/w300${e.still_path || ''}" onerror="this.src='https://via.placeholder.com/300x170?text=Episode+${e.episode_number}'">
                            <div class="item-info"><b>الحلقة ${e.episode_number} مترجمة</b></div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch(e) {
                grid.innerHTML = '<p style="color:red; text-align:center;">فشل في تحميل الحلقات.</p>';
            }
        }

        document.getElementById('closeTrailer').onclick = () => {
            document.getElementById('trailerModal').style.display = 'none';
            document.getElementById('trailerFrame').src = '';
        };

        // بدء تشغيل الصفحة
        loadData();
    </script>
</body>
</html>
