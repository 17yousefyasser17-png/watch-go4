<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGo - Premium Streaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { 
            --primary: #9b51e0; 
            --accent: #ff0000;
            --bg: #0b0b0b; 
            --text: #ffffff; 
            --glass: rgba(255, 255, 255, 0.03);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* تأثير البلور والجلو الشامل */
        .blur-container:hover .blur-item:not(:hover) { 
            filter: blur(8px) grayscale(0.5); 
            opacity: 0.4; 
            transform: scale(0.96);
        }

        .hero-section {
            position: relative; width: 100%; min-height: 100vh;
            background-size: cover; background-position: center top; background-attachment: fixed;
            padding: 40px 5%;
        }

        .hero-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(11,11,11,0.5) 0%, rgba(11,11,11,0.9) 80%, #0b0b0b 100%);
            z-index: 1;
        }

        .main-container { position: relative; z-index: 2; max-width: 1400px; margin: 0 auto; }

        /* تقسيم الصفحة */
        .movie-layout { display: grid; grid-template-columns: 280px 1fr 320px; gap: 30px; margin-top: 30px; }

        /* العمود الأول: البوستر */
        .poster-col img { 
            width: 100%; border-radius: 10px; border: 1px solid #333; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); transition: var(--transition);
        }
        .poster-col img:hover { transform: scale(1.03); border-color: var(--primary); box-shadow: 0 0 30px var(--primary); }

        /* العمود الثاني: المعلومات (نفس ستايل الصورة) */
        .info-col h1 { font-size: 32px; margin-bottom: 20px; font-weight: bold; }
        .info-col h1 span { color: #ccc; font-size: 24px; }

        .section-box { background: var(--glass); padding: 20px; border-radius: 10px; margin-bottom: 20px; border-right: 4px solid var(--accent); }
        .box-title { color: var(--accent); font-size: 20px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .box-title i { font-size: 24px; }

        .details-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .detail-item { display: flex; align-items: center; gap: 10px; font-size: 15px; }
        .detail-item i { color: var(--accent); font-size: 12px; }
        .detail-item b { color: #aaa; margin-left: 5px; }

        /* العمود الثالث: أزرار الأكشن والتريلر */
        .action-col { display: flex; flex-direction: column; gap: 15px; }
        .action-card { 
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; 
            text-align: center; cursor: pointer; transition: var(--transition);
            border: 1px solid #222;
        }
        .action-card:hover { background: var(--primary); transform: translateX(-10px); box-shadow: 0 0 30px var(--primary); }
        .action-card i { font-size: 30px; margin-bottom: 10px; display: block; }
        .action-card span { font-weight: bold; font-size: 18px; }

        .imdb-box { 
            background: #f5c518; color: #000; padding: 10px; border-radius: 5px; 
            font-weight: bold; display: flex; justify-content: space-between; align-items: center;
        }

        /* كروت المسلسلات والمشابهة */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .item-card { 
            position: relative; border-radius: 10px; overflow: hidden; border: 1px solid #222;
            transition: var(--transition); cursor: pointer; background: #111;
        }
        .item-card:hover { transform: scale(1.1) translateY(-10px); border-color: var(--primary); box-shadow: 0 0 30px var(--primary); z-index: 10; }
        .item-card img { width: 100%; height: 240px; object-fit: cover; }
        .item-card .badge { position: absolute; top: 10px; right: 10px; background: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .item-card .title { padding: 10px; font-size: 13px; text-align: center; background: rgba(0,0,0,0.8); }

        /* طاقم التمثيل */
        .cast-row { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cast-member { min-width: 80px; text-align: center; transition: var(--transition); }
        .cast-member:hover { transform: scale(1.2); filter: drop-shadow(0 0 10px var(--primary)); }
        .cast-member img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }

        #trailerModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(10px); }

        @media (max-width: 1100px) { .movie-layout { grid-template-columns: 1fr; } .action-col { order: -1; flex-direction: row; flex-wrap: wrap; } .action-card { flex: 1; } }
    </style>
</head>
<body>

<div class="hero-section" id="heroSection">
    <div class="hero-overlay"></div>
    <div class="main-container">
        
        <div class="movie-layout">
            <div class="poster-col blur-container">
                <img src="" id="poster" class="blur-item">
            </div>

            <div class="info-col">
                <h1 id="movieTitle">جاري التحميل...</h1>
                
                <div class="section-box">
                    <div class="box-title"><i class="fa-solid fa-quote-right"></i> قصة الفيلم</div>
                    <p id="overview" style="line-height: 1.8; color: #ddd;"></p>
                </div>

                <div class="section-box">
                    <div class="box-title"><i class="fa-solid fa-list-ul"></i> تفاصيل الفيلم</div>
                    <div class="details-list blur-container">
                        <div class="detail-item blur-item"><i class="fa-solid fa-square"></i> <b>قسم الفيلم:</b> <span id="detCat">--</span></div>
                        <div class="detail-item blur-item"><i class="fa-solid fa-square"></i> <b>نوع الفيلم:</b> <span id="detGenre">--</span></div>
                        <div class="detail-item blur-item"><i class="fa-solid fa-square"></i> <b>جودة الفيلم:</b> <span id="detQuality">WEB-DL</span></div>
                        <div class="detail-item blur-item"><i class="fa-solid fa-square"></i> <b>توقيت الفيلم:</b> <span id="detTime">--</span></div>
                        <div class="detail-item blur-item"><i class="fa-solid fa-square"></i> <b>موعد الصدور:</b> <span id="detYear">--</span></div>
                        <div class="detail-item blur-item"><i class="fa-solid fa-square"></i> <b>لغة الفيلم:</b> <span id="detLang">--</span></div>
                        <div class="detail-item blur-item"><i class="fa-solid fa-square"></i> <b>دولة الفيلم:</b> <span id="detCountry">--</span></div>
                    </div>
                </div>

                <div class="section-box">
                    <div class="box-title"><i class="fa-solid fa-users"></i> بطولة</div>
                    <div id="castContainer" class="cast-row blur-container"></div>
                </div>
            </div>

            <div class="action-col blur-container">
                <div class="action-card blur-item">
                    <i class="fa-solid fa-play-circle"></i>
                    <span>مشاهدة الآن</span>
                </div>
                <div class="action-card blur-item">
                    <i class="fa-solid fa-cloud-download-alt"></i>
                    <span>تحميل الآن</span>
                </div>
                <div id="openTrailer" class="action-card blur-item" style="border-color: #ff0000;">
                    <i class="fa-brands fa-youtube" style="color:#ff0000"></i>
                    <span>مشاهدة التريلر</span>
                </div>
                <div class="imdb-box blur-item">
                    <span>IMDb</span>
                    <span id="imdbRate">6.2</span>
                </div>
            </div>
        </div>

        <div id="seriesSection" style="display:none;">
            <div class="box-title" style="margin-top:40px;"><i class="fa-solid fa-layer-group"></i> المواسم المتاحة</div>
            <div class="grid-container blur-container" id="seasonsGrid"></div>
            
            <div id="episodesArea" style="display:none; margin-top:30px;">
                <div class="box-title"><i class="fa-solid fa-tv"></i> الحلقات</div>
                <div class="grid-container blur-container" id="episodesGrid"></div>
            </div>
        </div>

        <div class="box-title" style="margin-top:50px;"><i class="fa-solid fa-wand-magic-sparkles"></i> مشاهدة عروض أخرى</div>
        <div class="grid-container blur-container" id="relatedGrid"></div>

    </div>
</div>

<div id="trailerModal">
    <div style="position:relative; width:90%; max-width:900px;">
        <span id="closeTrailer" style="position:absolute; top:-40px; left:0; color:white; font-size:30px; cursor:pointer;">&times; إغلاق</span>
        <iframe id="trailerFrame" width="100%" height="500" src="" frameborder="0" allowfullscreen style="border-radius:10px; border: 2px solid var(--primary); box-shadow: 0 0 50px var(--primary);"></iframe>
    </div>
</div>

<script>
    const API_KEY = 'b838a848a571a893e6b0effe4bd53db8';
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const type = params.get('type') || 'movie';

    async function load() {
        if(!id) return;
        try {
            const [rAR, rEN, rVid, rSim] = await Promise.all([
                fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=ar-SA`),
                fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${API_KEY}&language=en-US&append_to_response=credits`),
                fetch(`https://api.themoviedb.org/3/${type}/${id}/videos?api_key=${API_KEY}`),
                fetch(`https://api.themoviedb.org/3/${type}/${id}/similar?api_key=${API_KEY}&language=ar-SA`)
            ]);

            const dAR = await rAR.json();
            const dEN = await rEN.json();
            const vids = await rVid.json();
            const similar = await rSim.json();

            // تطبيق صيغة الاسم المطلوبة
            const englishName = dEN.title || dEN.name;
            document.getElementById('movieTitle').innerHTML = `${englishName} <span>مترجم اون لاين</span>`;
            
            document.getElementById('overview').innerText = dAR.overview || dEN.overview;
            document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${dEN.poster_path}`;
            document.getElementById('heroSection').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${dEN.backdrop_path})`;
            
            // التفاصيل
            document.getElementById('detCat').innerText = type === 'tv' ? 'مسلسلات اجنبي' : 'افلام اجنبي';
            document.getElementById('detGenre').innerText = dAR.genres?.map(g=>g.name).join(' / ') || '--';
            document.getElementById('detTime').innerText = (dEN.runtime || dEN.episode_run_time?.[0] || '--') + ' دقيقة';
            document.getElementById('detYear').innerText = (dEN.release_date || dEN.first_air_date || '').split('-')[0];
            document.getElementById('detLang').innerText = 'الإنجليزية';
            document.getElementById('detCountry').innerText = dEN.production_countries?.[0]?.name || 'الولايات المتحدة';
            document.getElementById('imdbRate').innerText = (dEN.vote_average || 0).toFixed(1);

            // الممثلين
            const ctn = document.getElementById('castContainer');
            dEN.credits?.cast.slice(0, 8).forEach(c => {
                if(c.profile_path) ctn.innerHTML += `<div class="cast-member blur-item"><img src="https://image.tmdb.org/t/p/w200${c.profile_path}"><p style="font-size:10px; margin-top:5px;">${c.name}</p></div>`;
            });

            // مشابهة
            const relBox = document.getElementById('relatedGrid');
            similar.results?.slice(0, 12).forEach(item => {
                relBox.innerHTML += `
                    <a href="?id=${item.id}&type=${type}" class="item-card blur-item">
                        <img src="https://image.tmdb.org/t/p/w300${item.poster_path}">
                        <div class="title">${item.title || item.name}</div>
                    </a>`;
            });

            if(type === 'tv') {
                document.getElementById('seriesSection').style.display = 'block';
                const sGrid = document.getElementById('seasonsGrid');
                dEN.seasons?.filter(s => s.season_number > 0).forEach(s => {
                    sGrid.innerHTML += `<div class="item-card blur-item" onclick="loadEpisodes(${s.season_number})"><div class="badge">الموسم ${s.season_number}</div><img src="https://image.tmdb.org/t/p/w300${s.poster_path || dEN.poster_path}"><div class="title">الموسم ${s.season_number}</div></div>`;
                });
            }

            const trailer = vids.results?.find(v => v.type === 'Trailer');
            if(trailer) {
                document.getElementById('openTrailer').onclick = () => {
                    document.getElementById('trailerFrame').src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
                    document.getElementById('trailerModal').style.display = 'flex';
                };
            }

        } catch(e) { console.log(e); }
    }

    async function loadEpisodes(sn) {
        const area = document.getElementById('episodesArea');
        const grid = document.getElementById('episodesGrid');
        grid.innerHTML = '<p style="padding:20px; color:var(--primary);">جاري التحميل...</p>';
        area.style.display = 'block';
        area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${sn}?api_key=${API_KEY}&language=ar-SA`);
        const data = await res.json();
        grid.innerHTML = '';
        data.episodes?.forEach(e => {
            grid.innerHTML += `<div class="item-card blur-item"><div class="badge">الحلقة ${e.episode_number}</div><img src="https://image.tmdb.org/t/p/w300${e.still_path || ''}"><div class="title">الحلقة ${e.episode_number}</div></div>`;
        });
    }

    document.getElementById('closeTrailer').onclick = () => {
        document.getElementById('trailerModal').style.display = 'none';
        document.getElementById('trailerFrame').src = '';
    };

    load();
</script>
</body>
</html>
