<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشاهدة الفيلم - WatchGo</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .video-container { width: 90%; height: 80vh; border: 2px solid #9b51e0; border-radius: 15px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="video-container">
        <iframe id="videoPlayer" src="" allowfullscreen></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');

        async function startStreaming() {
            const res = await fetch(`http://localhost:3000/api/movies/${movieId}`);
            const movie = await res.json();
            
            // بنحط رابط السيرفر الخارجي جوه الـ iframe
            document.getElementById('videoPlayer').src = movie.link;
        }
        startStreaming();
    </script>
</body>
</html>
